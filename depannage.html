<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clinic Dépannage — Dépannage & remorquage 24h/24 en Gironde</title>
    <link rel="icon" type="image/svg+xml" href="favicon-dep.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --c-vert-nuit: #012a1a;
        --c-vert-foret: #0d5c3a;
        --c-vert-accent: #2ecc71;
        --c-blanc-casse: #f5f5f0;
        --c-noir-doux: #1a1a1a;
        --c-gris-100: #eeeee8;
        --c-gris-200: #ddddd5;
        --c-gris-300: #bfbfb6;
        --c-gris-400: #8c8c85;
        --c-gris-500: #5a5a55;

        --c-dep-rouge: #c0392b;
        --c-dep-rouge-clair: #e74c3c;
        --c-dep-rouge-dark: #8b1f14;
        --c-dep-rouge-bg: #fdecea;
        --c-dep-orange: #f39c12;
        --c-dep-orange-clair: #f5a623;
        --c-car-bleu: #1565a8;
        --c-car-bleu-clair: #1976d2;

        --ff-sans: "Inter", system-ui, -apple-system, sans-serif;
        --ff-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--ff-sans);
        color: var(--c-noir-doux);
        background: #fff;
        font-size: 15px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
      }

      /* ─── BUTTONS ─── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: var(--ff-sans);
        font-weight: 600;
        font-size: 14px;
        padding: 11px 20px;
        border-radius: 10px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.15s ease;
        white-space: nowrap;
      }
      .btn-danger {
        background: var(--c-dep-rouge);
        color: #fff;
      }
      .btn-danger:hover {
        background: var(--c-dep-rouge-dark);
      }
      .btn-ghost {
        background: transparent;
        color: #fff;
        border-color: rgba(255, 255, 255, 0.3);
      }
      .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .btn-ghost-dark {
        background: transparent;
        color: var(--c-noir-doux);
        border: 1.5px solid var(--c-gris-200);
      }
      .btn-ghost-dark:hover {
        background: var(--c-gris-100);
      }
      .btn-lg {
        padding: 14px 24px;
        font-size: 15px;
        border-radius: 12px;
      }
      .btn-xl {
        padding: 16px 28px;
        font-size: 16px;
        border-radius: 12px;
        font-weight: 700;
      }

      /* ─── NAVBAR (blanche, fixe) ─── */
      .topnav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: #fff;
        border-bottom: 1px solid var(--c-gris-200);
        padding: 0;
      }
      .topnav .inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 32px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .nav-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: -0.015em;
        color: var(--c-noir-doux);
      }
      .nav-brand .glyph {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: linear-gradient(
          135deg,
          var(--c-dep-rouge-clair) 0%,
          var(--c-dep-rouge-dark) 100%
        );
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 800;
        font-size: 15px;
        flex-shrink: 0;
      }
      .nav-brand .brand-name span {
        color: var(--c-dep-rouge-clair);
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .nav-zone {
        font-size: 13.5px;
        color: var(--c-gris-500);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .nav-zone svg {
        color: var(--c-dep-rouge);
      }

      /* ─── UNIVERSE NAV LINKS ─── */
      .nav-universe-links {
        display: flex;
        gap: 2px;
        align-items: center;
      }
      .nav-uni-link {
        color: var(--c-gris-500);
        padding: 7px 12px;
        border-radius: 8px;
        font-size: 13.5px;
        font-weight: 500;
        transition: all 0.15s ease;
        display: flex;
        align-items: center;
        gap: 7px;
        white-space: nowrap;
      }
      .nav-uni-link:hover {
        color: var(--c-noir-doux);
        background: var(--c-gris-100);
      }
      .nav-uni-link .swatch {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .nav-uni-link.pro .swatch {
        background: #2ecc71;
      }
      .nav-uni-link.dep .swatch {
        background: #e74c3c;
      }
      .nav-uni-link.mec .swatch {
        background: #f59e0b;
      }
      .nav-uni-link.car .swatch {
        background: #1976d2;
      }
      .nav-uni-link.active {
        color: var(--c-noir-doux);
        font-weight: 600;
        background: var(--c-gris-100);
      }
      .nav-mobile-group {
        display: none;
        align-items: center;
        gap: 10px;
      }
      .nav-mobile-call {
        display: grid;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        color: #fff;
        place-items: center;
        flex-shrink: 0;
      }
      .nav-burger {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        width: 38px;
        height: 38px;
        border-radius: 9px;
        padding: 10px;
        background: var(--c-gris-100);
        cursor: pointer;
        border: none;
        flex-shrink: 0;
      }
      .nav-burger span {
        display: block;
        height: 2px;
        border-radius: 2px;
        background: var(--c-noir-doux);
        transition: all 0.25s ease;
      }
      .nav-burger.open span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }
      .nav-burger.open span:nth-child(2) {
        opacity: 0;
        transform: scaleX(0);
      }
      .nav-burger.open span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }
      .mobile-drawer {
        position: fixed;
        inset: 0;
        z-index: 49;
        pointer-events: none;
      }
      .mobile-drawer-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .mobile-drawer-panel {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(300px, 85vw);
        background: var(--c-vert-nuit);
        padding: 80px 24px 36px;
        display: flex;
        flex-direction: column;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        border-left: 1px solid rgba(255, 255, 255, 0.08);
      }
      .mobile-drawer.open {
        pointer-events: all;
      }
      .mobile-drawer.open .mobile-drawer-backdrop {
        opacity: 1;
      }
      .mobile-drawer.open .mobile-drawer-panel {
        transform: translateX(0);
      }
      .mobile-nav-links {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: auto;
      }
      .mobile-nav-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 12px;
        color: #fff;
        font-size: 16px;
        font-weight: 500;
        transition: background 0.15s ease;
      }
      .mobile-nav-link:hover {
        background: rgba(255, 255, 255, 0.07);
      }
      .mobile-nav-link.active {
        background: rgba(255, 255, 255, 0.1);
        font-weight: 600;
      }
      .mobile-nav-link .swatch {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .mobile-nav-link.pro .swatch {
        background: #2ecc71;
      }
      .mobile-nav-link.dep .swatch {
        background: #e74c3c;
      }
      .mobile-nav-link.mec .swatch {
        background: #f59e0b;
      }
      .mobile-nav-link.car .swatch {
        background: #1976d2;
      }
      .mobile-drawer-cta {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 18px;
        border-radius: 12px;
        margin-top: 20px;
        font-weight: 600;
        font-size: 15px;
        justify-content: center;
        color: #fff;
      }

      /* ─── HERO DÉPANNAGE ─── */

      .hero-dep {
        background: linear-gradient(
          148deg,
          #6b0c06 0%,
          var(--c-dep-rouge) 55%,
          #d44000 100%
        );
        color: #fff;
        padding: 108px 0 0;
        position: relative;
        overflow: hidden;
      }
      .hero-dep::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse 80% 70% at 80% 20%,
            rgba(255, 160, 0, 0.1),
            transparent 60%
          ),
          radial-gradient(
            ellipse 50% 60% at 5% 90%,
            rgba(0, 0, 0, 0.25),
            transparent 55%
          ),
          repeating-linear-gradient(
            115deg,
            rgba(255, 255, 255, 0.018) 0px,
            rgba(255, 255, 255, 0.018) 1px,
            transparent 1px,
            transparent 80px
          ),
          repeating-linear-gradient(
            25deg,
            rgba(255, 255, 255, 0.012) 0px,
            rgba(255, 255, 255, 0.012) 1px,
            transparent 1px,
            transparent 80px
          );
        pointer-events: none;
      }
      .hero-dep .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 32px;
        position: relative;
        z-index: 1;
      }
      .hero-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 56px;
        align-items: center;
        padding: 72px 0 80px;
      }

      /* Badge status */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(8px);
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.95);
        margin-bottom: 28px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4ade80;
        box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.25);
        flex-shrink: 0;
      }

      /* H1 */
      .hero-dep h1 {
        font-size: 62px;
        line-height: 1.03;
        letter-spacing: -0.035em;
        font-weight: 800;
        margin: 0 0 20px;
      }
      .hero-dep h1 .accent {
        color: var(--c-dep-orange-clair);
      }

      /* Lede */
      .hero-dep .lede {
        font-size: 16.5px;
        color: rgba(255, 255, 255, 0.78);
        line-height: 1.6;
        max-width: 480px;
        margin: 0 0 36px;
      }

      /* Phone card */
      .phone-card {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        background: #fff;
        border-radius: 16px;
        padding: 18px 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
        margin-bottom: 16px;
      }
      .phone-card .phone-ico-wrap {
        width: 46px;
        height: 46px;
        border-radius: 12px;
        background: var(--c-dep-rouge-bg);
        color: var(--c-dep-rouge);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .phone-card .phone-label {
        font-family: var(--ff-mono);
        font-size: 10.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--c-gris-400);
        margin-bottom: 3px;
      }
      .phone-card .phone-num {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--c-noir-doux);
        line-height: 1;
      }
      .callback-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13.5px;
        color: rgba(255, 255, 255, 0.7);
        transition: color 0.15s;
      }
      .callback-link:hover {
        color: #fff;
      }
      .callback-link svg {
        opacity: 0.7;
      }

      /* Stats card (right) */
      .stats-card {
        background: rgba(0, 0, 0, 0.42);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 22px;
        padding: 32px;
      }
      .stats-card .sc-label {
        font-family: var(--ff-mono);
        font-size: 10.5px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 16px;
      }
      .stats-card .sc-big {
        font-size: 80px;
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1;
        color: #fff;
        margin-bottom: 2px;
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .stats-card .sc-big small {
        font-size: 30px;
        font-weight: 600;
        opacity: 0.75;
      }
      .stats-card .sc-sub {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 28px;
      }
      .stats-card .sc-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin-bottom: 24px;
      }
      .stats-card .sc-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }
      .stats-card .sc-mini-label {
        font-family: var(--ff-mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 6px;
      }
      .stats-card .sc-mini-val {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #fff;
      }
      .stats-card .sc-row .sc-mini:last-child {
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        padding-left: 24px;
      }

      /* ─── TRUST BAR ─── */
      .trust-bar {
        background: var(--c-blanc-casse);
        border-bottom: 1px solid var(--c-gris-200);
        padding: 0;
      }
      .trust-bar .inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 32px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
      }
      .trust-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 24px 0;
        border-right: 1px solid var(--c-gris-200);
        padding-right: 24px;
        padding-left: 24px;
      }
      .trust-item:first-child {
        padding-left: 0;
      }
      .trust-item:last-child {
        border-right: none;
      }
      .trust-ico {
        width: 42px;
        height: 42px;
        border-radius: 11px;
        background: var(--c-dep-rouge-bg);
        color: var(--c-dep-rouge);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .trust-item h5 {
        margin: 0 0 2px;
        font-size: 14.5px;
        font-weight: 700;
        color: var(--c-noir-doux);
      }
      .trust-item p {
        margin: 0;
        font-size: 12.5px;
        color: var(--c-gris-400);
        line-height: 1.35;
      }

      /* ─── SECTIONS COMMUNES ─── */
      .section {
        padding: 96px 0;
      }
      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 32px;
      }
      .section-head {
        display: flex;
        flex-direction: row;
        gap: 64px;
        margin-bottom: 56px;
        width: 100%;
        align-items: start;
      }
      .lbl {
        font-family: var(--ff-mono);
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--c-dep-rouge);
        margin: 0;
        display: flex;
        align-items: center;
        gap: 12px;
        width: 50%;
      }
      .lbl::before {
        content: "";
        width: 28px;
        height: 1px;
        background: var(--c-dep-rouge);
      }
      .section-head h2 {
        font-size: 44px;
        line-height: 1.06;
        letter-spacing: -0.025em;
        font-weight: 700;
        margin: 0;
        color: var(--c-vert-nuit);
      }
      .section-head .desc {
        font-size: 15.5px;
        color: var(--c-gris-500);
        line-height: 1.65;
        margin: 0;
        width: 50%;
      }

      /* ─── SERVICES ─── */
      .services-section {
        background: #fff;
        border-top: 1px solid var(--c-gris-200);
      }
      .services-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .srv-card {
        padding: 26px 28px;
        border-radius: 18px;
        border: 1px solid var(--c-gris-200);
        background: var(--c-blanc-casse);
        display: flex;
        flex-direction: column;
        gap: 14px;
        transition: all 0.2s ease;
      }
      .srv-card:hover {
        border-color: rgba(192, 57, 43, 0.3);
        box-shadow: 0 6px 24px rgba(192, 57, 43, 0.08);
        transform: translateY(-2px);
      }
      .srv-ico {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: var(--c-dep-rouge-bg);
        color: var(--c-dep-rouge);
        display: grid;
        place-items: center;
      }
      .srv-card h4 {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        color: var(--c-vert-nuit);
      }
      .srv-card p {
        margin: 0;
        font-size: 13.5px;
        color: var(--c-gris-500);
        line-height: 1.55;
      }
      .srv-tag {
        display: inline-flex;
        font-family: var(--ff-mono);
        font-size: 10.5px;
        letter-spacing: 0.06em;
        color: var(--c-dep-rouge);
        background: var(--c-dep-rouge-bg);
        padding: 4px 10px;
        border-radius: 20px;
        margin-top: auto;
        font-weight: 600;
      }

      /* ─── URGENCY BANNER ─── */
      .urgency-banner {
        background: linear-gradient(
          135deg,
          var(--c-dep-rouge-dark) 0%,
          var(--c-dep-rouge) 60%,
          #d44000 100%
        );
        padding: 56px 0;
        text-align: center;
        color: #fff;
        position: relative;
        overflow: hidden;
      }
      .urgency-banner::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.025) 0px,
          rgba(255, 255, 255, 0.025) 1px,
          transparent 1px,
          transparent 60px
        );
        pointer-events: none;
      }
      .urgency-banner .ub-inner {
        position: relative;
        z-index: 1;
      }
      .urgency-banner .ub-label {
        font-family: var(--ff-mono);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--c-dep-orange-clair);
        margin-bottom: 14px;
      }
      .urgency-banner h2 {
        font-size: 44px;
        font-weight: 700;
        letter-spacing: -0.03em;
        margin: 0 0 12px;
      }
      .urgency-banner p {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.8);
        margin: 0 auto 28px;
        max-width: 520px;
      }
      .ub-row {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      /* ─── COMMENT ÇA MARCHE ─── */
      .how-section {
        background: var(--c-blanc-casse);
        border-top: 1px solid var(--c-gris-200);
      }
      .steps-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0;
        position: relative;
      }
      .steps-grid::before {
        content: "";
        position: absolute;
        top: 33px;
        left: calc(12.5% + 20px);
        right: calc(12.5% + 20px);
        height: 1px;
        background: var(--c-gris-200);
        z-index: 0;
      }
      .step {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 0 20px;
        position: relative;
        z-index: 1;
      }
      .step-ico {
        width: 66px;
        height: 66px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid var(--c-gris-200);
        display: grid;
        place-items: center;
        color: var(--c-dep-rouge);
        margin-bottom: 22px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        transition: all 0.2s ease;
      }
      .step:hover .step-ico {
        background: var(--c-dep-rouge);
        color: #fff;
        border-color: var(--c-dep-rouge);
      }
      .step h4 {
        margin: 0 0 6px;
        font-size: 16px;
        font-weight: 700;
        color: var(--c-vert-nuit);
      }
      .step p {
        margin: 0;
        font-size: 13.5px;
        color: var(--c-gris-500);
        line-height: 1.5;
      }

      /* ─── ZONE ─── */
      .zone-section {
        background: #fff;
        border-top: 1px solid var(--c-gris-200);
      }
      .zone-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 64px;
        align-items: start;
      }
      .zone-info h3 {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--c-vert-nuit);
        margin: 0 0 14px;
      }
      .zone-info p {
        font-size: 15px;
        color: var(--c-gris-500);
        line-height: 1.65;
        margin: 0 0 28px;
      }
      .zone-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        margin-bottom: 28px;
      }
      .zone-tag {
        padding: 7px 15px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        background: var(--c-dep-rouge-bg);
        color: var(--c-dep-rouge);
        border: 1px solid rgba(192, 57, 43, 0.15);
      }
      .zone-tag.primary {
        background: var(--c-dep-rouge);
        color: #fff;
        border-color: var(--c-dep-rouge);
      }
      .zone-map {
        border-radius: 22px;
        overflow: hidden;
        background: linear-gradient(
          145deg,
          #1a2a1a 0%,
          var(--c-vert-nuit) 100%
        );
        height: 360px;
        display: grid;
        place-items: center;
        position: relative;
        border: 1px solid var(--c-gris-200);
      }
      .zone-map-inner {
        text-align: center;
        color: #fff;
        position: relative;
        z-index: 1;
      }
      .zone-map-pin {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(192, 57, 43, 0.2);
        border: 2px solid var(--c-dep-rouge-clair);
        display: grid;
        place-items: center;
        margin: 0 auto 18px;
        color: var(--c-dep-rouge-clair);
      }
      .zone-rings {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
      }
      .zone-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(192, 57, 43, 0.2);
        animation: zone-expand 4s ease-out infinite;
      }
      .zone-ring:nth-child(1) {
        width: 110px;
        height: 110px;
        animation-delay: 0s;
      }
      .zone-ring:nth-child(2) {
        width: 190px;
        height: 190px;
        animation-delay: 1.2s;
      }
      .zone-ring:nth-child(3) {
        width: 290px;
        height: 290px;
        animation-delay: 2.4s;
      }
      @keyframes zone-expand {
        0% {
          opacity: 0.7;
          transform: scale(0.85);
        }
        100% {
          opacity: 0;
          transform: scale(1.08);
        }
      }

      /* ─── TARIFS ─── */
      .tarifs-section {
        background: var(--c-blanc-casse);
        border-top: 1px solid var(--c-gris-200);
      }
      .tarifs-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .tarif-card {
        padding: 28px 30px;
        border-radius: 20px;
        border: 1px solid var(--c-gris-200);
        background: #fff;
        position: relative;
        overflow: hidden;
        transition: all 0.2s ease;
      }
      .tarif-card:hover {
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.07);
        transform: translateY(-2px);
      }
      .tarif-card.featured {
        border-color: var(--c-dep-rouge);
        box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.06);
      }
      .tarif-card.featured::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: linear-gradient(
          180deg,
          var(--c-dep-rouge) 0%,
          var(--c-dep-orange) 100%
        );
      }
      .tarif-badge {
        display: inline-flex;
        margin-bottom: 14px;
        font-family: var(--ff-mono);
        font-size: 10.5px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 4px 12px;
        border-radius: 20px;
        font-weight: 600;
        background: var(--c-dep-rouge-bg);
        color: var(--c-dep-rouge);
      }
      .tarif-card.featured .tarif-badge {
        background: var(--c-dep-rouge);
        color: #fff;
      }
      .tarif-card h4 {
        margin: 0 0 14px;
        font-size: 19px;
        font-weight: 700;
        color: var(--c-vert-nuit);
      }
      .tarif-price {
        font-size: 38px;
        font-weight: 800;
        color: var(--c-dep-rouge);
        letter-spacing: -0.025em;
        line-height: 1.1;
        margin-bottom: 6px;
      }
      .tarif-price small {
        font-size: 15px;
        font-weight: 500;
        color: var(--c-gris-400);
      }
      .tarif-desc {
        font-size: 13px;
        color: var(--c-gris-500);
        margin: 0 0 22px;
        line-height: 1.5;
      }
      .tarif-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .tarif-list li {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-size: 13.5px;
      }
      .tarif-list .chk {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--c-dep-rouge-bg);
        color: var(--c-dep-rouge);
        display: grid;
        place-items: center;
        flex-shrink: 0;
        margin-top: 1px;
      }

      /* ─── POURQUOI NOUS ─── */
      .why-dep-section {
        background: #1a0302;
        color: #fff;
        padding: 96px 0;
        position: relative;
        overflow: hidden;
      }
      .why-dep-section::before {
        content: "";
        position: absolute;
        right: -150px;
        top: -150px;
        width: 420px;
        height: 420px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(192, 57, 43, 0.18),
          transparent 65%
        );
        pointer-events: none;
      }
      .why-dep-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        position: relative;
        z-index: 1;
      }
      .why-dep-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 18px;
        padding: 26px 28px;
        display: flex;
        gap: 18px;
        align-items: flex-start;
        transition: all 0.2s ease;
      }
      .why-dep-card:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .wdc-ico {
        width: 46px;
        height: 46px;
        border-radius: 12px;
        background: rgba(192, 57, 43, 0.22);
        color: var(--c-dep-rouge-clair);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .wdc-body h4 {
        margin: 0 0 5px;
        font-size: 16px;
        font-weight: 700;
      }
      .wdc-body p {
        margin: 0;
        font-size: 13.5px;
        color: rgba(255, 255, 255, 0.55);
        line-height: 1.5;
      }

      /* ─── STATS ─── */
      .stats-dep-section {
        background: linear-gradient(
          135deg,
          #1a0302 0%,
          var(--c-dep-rouge-dark) 50%,
          var(--c-dep-rouge) 100%
        );
        color: #fff;
        padding: 96px 0;
        position: relative;
        overflow: hidden;
      }
      .stats-dep-section::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          115deg,
          rgba(255, 255, 255, 0.02) 0px,
          rgba(255, 255, 255, 0.02) 1px,
          transparent 1px,
          transparent 80px
        );
        pointer-events: none;
      }
      .stats-dep-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0;
        position: relative;
        z-index: 1;
        justify-content: center;
      }
      .stat-dep-block {
        border-left: 1px solid rgba(255, 255, 255, 0.15);
        padding-left: 28px;
        text-align: center;
      }
      .stat-dep-block:first-child {
        border-left: none;
        padding-left: 0;
      }
      .stat-dep-block .num {
        font-size: 56px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.03em;
        margin-bottom: 10px;
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 6px;
      }
      .stat-dep-block .num small {
        font-size: 20px;
        opacity: 0.65;
        font-weight: 500;
      }
      .stat-dep-block .num em {
        font-style: normal;
        color: var(--c-dep-orange-clair);
      }
      .stat-dep-block h5 {
        margin: 0 0 5px;
        font-size: 14px;
        font-weight: 700;
      }
      .stat-dep-block p {
        margin: 0;
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.45;
      }

      /* ─── AVIS ─── */
      .avis-section {
        background: #fff;
        border-top: 1px solid var(--c-gris-200);
      }
      .avis-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .avis-card {
        padding: 26px 28px;
        border-radius: 18px;
        background: var(--c-blanc-casse);
        border: 1px solid var(--c-gris-200);
      }
      .avis-stars {
        display: flex;
        gap: 3px;
        margin-bottom: 12px;
        color: var(--c-dep-orange);
      }
      .avis-text {
        font-size: 14px;
        color: var(--c-gris-500);
        line-height: 1.6;
        margin: 0 0 18px;
        font-style: italic;
      }
      .avis-author {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .avis-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--c-dep-rouge) 0%,
          var(--c-dep-rouge-dark) 100%
        );
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 13px;
        flex-shrink: 0;
      }
      .avis-name {
        font-size: 13.5px;
        font-weight: 700;
        color: var(--c-vert-nuit);
      }
      .avis-date {
        font-size: 12px;
        color: var(--c-gris-400);
      }

      /* ─── CTA FINAL ─── */
      .cta-dep-section {
        padding: 96px 0;
        background: var(--c-blanc-casse);
        text-align: center;
        border-top: 1px solid var(--c-gris-200);
      }
      .cta-dep-section h2 {
        font-size: 48px;
        line-height: 1.05;
        letter-spacing: -0.03em;
        font-weight: 800;
        margin: 0 0 14px;
        color: var(--c-vert-nuit);
      }
      .cta-dep-section h2 em {
        font-style: normal;
        color: var(--c-dep-rouge);
      }
      .cta-dep-section > .container > p {
        font-size: 16.5px;
        color: var(--c-gris-500);
        margin: 0 auto 32px;
        max-width: 520px;
      }
      .cta-row {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      /* ─── FOOTER ─── */
      .footer {
        background: #1a0302;
        color: rgba(255, 255, 255, 0.65);
        padding: 72px 0 28px;
      }
      .footer-grid {
        display: grid;
        grid-template-columns: 1.4fr 1fr 1fr 1fr;
        gap: 48px;
        padding-bottom: 48px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      }
      .footer-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .footer-brand .glyph {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: linear-gradient(
          135deg,
          var(--c-dep-rouge-clair) 0%,
          var(--c-dep-rouge-dark) 100%
        );
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 800;
        font-size: 13px;
      }
      .footer-brand span {
        font-weight: 700;
        font-size: 17px;
        color: #fff;
        letter-spacing: -0.015em;
      }
      .footer-tagline {
        font-size: 13.5px;
        color: rgba(255, 255, 255, 0.45);
        line-height: 1.55;
        max-width: 270px;
        margin-bottom: 22px;
      }
      .footer-contact {
        font-size: 13.5px;
        color: rgba(255, 255, 255, 0.7);
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .footer-contact strong {
        color: #fff;
        font-weight: 600;
        display: block;
      }
      .footer-col h6 {
        font-family: var(--ff-mono);
        font-size: 10.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.38);
        margin: 0 0 16px;
        font-weight: 600;
      }
      .footer-col ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 9px;
        font-size: 13.5px;
      }
      .footer-col a:hover {
        color: #fff;
      }
      .footer-bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 22px;
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.35);
      }
      .footer-legal {
        display: flex;
        gap: 22px;
      }

      /* ─── SECTION NAV ─── */
      .section-nav {
        position: sticky;
        top: 64px;
        z-index: 90;
        background: #fff;
        border-bottom: 1px solid var(--c-gris-200);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }
      .section-nav .sn-inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 32px;
        display: flex;
        align-items: center;
        gap: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .section-nav .sn-inner::-webkit-scrollbar {
        display: none;
      }
      .sn-link {
        padding: 14px 18px;
        font-size: 13.5px;
        font-weight: 500;
        color: var(--c-gris-500);
        white-space: nowrap;
        border-bottom: 2px solid transparent;
        transition: all 0.15s ease;
        flex-shrink: 0;
      }
      .sn-link:hover {
        color: var(--c-dep-rouge);
      }
      .sn-link.active {
        color: var(--c-dep-rouge);
        border-bottom-color: var(--c-dep-rouge);
      }
      .sn-sep {
        width: 1px;
        height: 18px;
        background: var(--c-gris-200);
        flex-shrink: 0;
      }

      /* ─── RESPONSIVE ─── */
      @media (max-width: 980px) {
        .hero-dep h1 {
          font-size: 42px;
        }
        .hero-grid {
          grid-template-columns: 1fr;
          gap: 40px;
        }
        .stats-card {
          display: none;
        }
        .trust-bar .inner {
          grid-template-columns: 1fr 1fr;
        }
        .trust-item {
          border-right: none;
          border-bottom: 1px solid var(--c-gris-200);
        }
        .trust-item:nth-child(odd) {
          padding-left: 0;
        }
        .section-head {
          grid-template-columns: 1fr;
          gap: 20px;
        }
        .section-head h2 {
          font-size: 32px;
        }
        .services-grid,
        .tarifs-grid,
        .avis-grid,
        .why-dep-grid {
          grid-template-columns: 1fr;
        }
        .steps-grid {
          grid-template-columns: 1fr 1fr;
          gap: 28px;
        }
        .steps-grid::before {
          display: none;
        }
        .zone-grid {
          grid-template-columns: 1fr;
        }
        .stats-dep-grid {
          grid-template-columns: 1fr 1fr;
          gap: 24px;
        }
        .stat-dep-block {
          border-left: none;
          padding-left: 0;
          border-top: 1px solid rgba(255, 255, 255, 0.1);
          padding-top: 22px;
        }
        .stat-dep-block:first-child {
          border-top: none;
          padding-top: 0;
        }
        .footer-grid {
          grid-template-columns: 1fr 1fr;
          gap: 28px;
        }
        .topnav .nav-zone {
          display: none;
        }
        .nav-universe-links {
          display: none;
        }
        .nav-mobile-group {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"

    ></script>

            "tarifs",
            "avis",
            "contact",
          ];
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) setActive(e.target.id);
              });
            },
            { rootMargin: "-30% 0px -60% 0px" },
          );
          sections.forEach((id) => {
            const el = document.getElementById(id);
            if (el) obs.observe(el);
          });
          return () => obs.disconnect();
        }, []);
        const links = [
          { id: "services", label: "Nos services" },
          { id: "comment-ca-marche", label: "Comment ça marche" },
