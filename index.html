<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ClinicAuto — Garage, dépannage et carrosserie</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
:root{
  --c-vert-nuit:#012A1A;
  --c-vert-foret:#0D5C3A;
  --c-vert-accent:#2ECC71;
  --c-vert-accent-dark:#27AE60;
  --c-blanc-casse:#F5F5F0;
  --c-noir-doux:#1A1A1A;
  --c-gris-50:#FAFAF8;
  --c-gris-100:#EEEEE8;
  --c-gris-200:#DDDDD5;
  --c-gris-300:#BFBFB6;
  --c-gris-400:#8C8C85;
  --c-gris-500:#5A5A55;
  --c-gris-600:#3A3A37;

  --c-pro-navy:#1A2744;
  --c-pro-navy-2:#243260;
  --c-dep-rouge:#C0392B;
  --c-dep-rouge-clair:#E74C3C;
  --c-dep-orange:#F39C12;
  --c-car-bleu:#1565A8;
  --c-car-bleu-clair:#1976D2;
  --c-car-bleu-pastel:#90CAF9;

  --ff-sans:"Inter", system-ui, -apple-system, sans-serif;
  --ff-mono:"JetBrains Mono", ui-monospace, Menlo, monospace;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--ff-sans);
  color:var(--c-noir-doux);
  background:var(--c-blanc-casse);
  font-size:15px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
a{color:inherit; text-decoration:none}
button{font-family:inherit; cursor:pointer; border:none}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--ff-sans); font-weight:500; font-size:14px;
  padding:11px 20px; border-radius:10px;
  border:1px solid transparent; cursor:pointer;
  transition:all .15s ease; white-space:nowrap;
}
.btn-primary{background:var(--c-vert-foret); color:#fff}
.btn-primary:hover{background:#0a4a30}
.btn-accent{background:var(--c-vert-accent); color:var(--c-vert-nuit); font-weight:600}
.btn-accent:hover{background:var(--c-vert-accent-dark); color:#fff}
.btn-ghost{background:transparent; color:#fff; border-color:rgba(255,255,255,.22)}
.btn-ghost:hover{background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.4)}
.btn-ghost-dark{background:transparent; color:var(--c-vert-nuit); border-color:var(--c-gris-300)}
.btn-ghost-dark:hover{background:var(--c-gris-100)}
.btn-lg{padding:14px 26px; font-size:15px; border-radius:12px}

/* ─── NAVIGATION ─── */
.topnav{
  position:fixed; top:0; left:0; right:0; z-index:50;
  padding:18px 0; transition:all .3s ease;
}
.topnav.scrolled{
  background:rgba(1,42,26,.92);
  backdrop-filter:blur(14px);
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.topnav .container{
  max-width:1280px; margin:0 auto; padding:0 32px;
  display:flex; align-items:center; justify-content:space-between;
}
.wordmark{
  display:inline-flex; align-items:center; gap:10px;
  color:#fff; font-weight:700; font-size:19px; letter-spacing:-.015em;
}
.wordmark .glyph{
  width:30px; height:30px; border-radius:8px;
  background:linear-gradient(135deg,var(--c-vert-accent) 0%, var(--c-vert-foret) 100%);
  display:grid; place-items:center; color:#fff; font-weight:800; font-size:14px;
}
.wordmark .accent{color:var(--c-vert-accent)}
.nav-links{display:flex; gap:6px; align-items:center}
.nav-link{
  color:rgba(255,255,255,.78); padding:8px 14px; border-radius:8px;
  font-size:14px; font-weight:500; transition:all .15s ease;
  display:flex; align-items:center; gap:8px;
}
.nav-link:hover{color:#fff; background:rgba(255,255,255,.06)}
.nav-link .swatch{
  width:8px; height:8px; border-radius:50%;
}
.nav-link.pro .swatch{background:var(--c-vert-accent)}
.nav-link.dep .swatch{background:var(--c-dep-rouge-clair)}
.nav-link.car .swatch{background:var(--c-car-bleu-clair)}
.nav-cta{margin-left:14px}
.nav-mobile-call{
  display:grid; width:40px; height:40px; border-radius:50%;
  background:var(--c-vert-accent); color:var(--c-vert-nuit);
  place-items:center; flex-shrink:0;
}
.nav-burger{
  display:flex; flex-direction:column; justify-content:center; gap:5px;
  width:40px; height:40px; border-radius:10px; padding:10px;
  background:rgba(255,255,255,.08); cursor:pointer; border:none;
  flex-shrink:0;
}
.nav-burger span{
  display:block; height:2px; border-radius:2px;
  background:#fff; transition:all .25s ease;
}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-burger.open span:nth-child(2){opacity:0; transform:scaleX(0)}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.nav-mobile-group{display:none}

/* Mobile drawer */
.mobile-drawer{
  position:fixed; inset:0; z-index:49;
  pointer-events:none;
}
.mobile-drawer-backdrop{
  position:absolute; inset:0;
  background:rgba(0,0,0,.5);
  opacity:0; transition:opacity .3s ease;
}
.mobile-drawer-panel{
  position:absolute; top:0; right:0; bottom:0;
  width:min(320px, 85vw);
  background:var(--c-vert-nuit);
  padding:88px 28px 40px;
  display:flex; flex-direction:column;
  transform:translateX(100%); transition:transform .3s ease;
  border-left:1px solid rgba(255,255,255,.08);
}
.mobile-drawer.open{pointer-events:all}
.mobile-drawer.open .mobile-drawer-backdrop{opacity:1}
.mobile-drawer.open .mobile-drawer-panel{transform:translateX(0)}

.mobile-nav-links{
  display:flex; flex-direction:column; gap:4px; margin-bottom:auto;
}
.mobile-nav-link{
  display:flex; align-items:center; gap:14px;
  padding:16px 18px; border-radius:14px;
  color:#fff; font-size:17px; font-weight:500;
  transition:background .15s ease;
}
.mobile-nav-link:hover{background:rgba(255,255,255,.07)}
.mobile-nav-link .swatch{
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
}
.mobile-nav-link.pro .swatch{background:var(--c-vert-accent)}
.mobile-nav-link.dep .swatch{background:var(--c-dep-rouge-clair)}
.mobile-nav-link.car .swatch{background:var(--c-car-bleu-clair)}
.mobile-drawer-cta{
  display:flex; align-items:center; gap:10px;
  padding:16px 20px; border-radius:14px; margin-top:24px;
  background:var(--c-vert-accent); color:var(--c-vert-nuit);
  font-weight:600; font-size:15px; justify-content:center;
}

/* ─── HERO ─── */
.hero{
  background:var(--c-vert-nuit); color:#fff;
  min-height:100vh; padding:110px 0 80px;
  position:relative; overflow:hidden;
}
.hero::before{
  content:""; position:absolute; right:-200px; top:-200px;
  width:680px; height:680px; border-radius:50%;
  background:radial-gradient(circle at center, rgba(46,204,113,.18), transparent 65%);
  pointer-events:none;
}
.hero::after{
  content:""; position:absolute; left:-300px; bottom:-300px;
  width:600px; height:600px; border-radius:50%;
  background:radial-gradient(circle at center, rgba(13,92,58,.4), transparent 65%);
  pointer-events:none;
}
.container{max-width:1280px; margin:0 auto; padding:0 32px; position:relative; z-index:1}
.hero-grid{
  display:flex; flex-direction:column; align-items:center;
  text-align:center;
}
.hero-eyebrow{
  font-family:var(--ff-mono); font-size:12px; letter-spacing:.16em;
  text-transform:uppercase; color:var(--c-vert-accent);
  margin-bottom:20px; display:inline-flex; align-items:center; gap:10px;
}
.hero-eyebrow .dot{
  width:7px; height:7px; border-radius:50%; background:var(--c-vert-accent);
  box-shadow:0 0 0 4px rgba(46,204,113,.18);
}
.hero h1{
  font-size:64px; line-height:1.02; letter-spacing:-.035em;
  font-weight:600; margin:0 0 24px; max-width:810px;
}
.hero h1 em{font-style:normal; color:var(--c-vert-accent)}
.hero .lede{
  font-size:18px; color:rgba(255,255,255,.72); max-width:520px;
  margin:0 0 0; line-height:1.55;
}
.hero-cta{display:flex; gap:14px; flex-wrap:wrap}
.hero-meta{
  margin-top:56px; padding-top:28px;
  border-top:1px solid rgba(255,255,255,.1);
  display:flex; gap:48px;
}
.hero-meta .stat .v{
  font-size:30px; font-weight:600; letter-spacing:-.02em;
  color:#fff; display:block; line-height:1;
}
.hero-meta .stat .k{
  font-family:var(--ff-mono); font-size:11px; letter-spacing:.1em;
  color:rgba(255,255,255,.5); text-transform:uppercase; margin-top:8px; display:block;
}

/* Visual: activity cards in hero */
.hero-visual{
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:25px; position:relative;
  width:100%; margin-top:48px;
}
.hv-card{
  border-radius:20px; padding:26px 26px 22px; color:#fff;
  display:flex; flex-direction:column; gap:0;
  position:relative; overflow:hidden;
  transition:transform .25s ease, box-shadow .25s ease;
  text-decoration:none;
  align-items: center;
}
.hv-card:hover{transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,.3)}
.hv-card .hv-ico{
  width:44px; height:44px; border-radius:12px;
  background:rgba(255,255,255,.15); display:grid; place-items:center;
  margin-bottom:20px; flex-shrink:0;
}
.hv-card .hv-text .t{
  font-size:18px; font-weight:600; letter-spacing:-.02em;
  line-height:1.2; margin-bottom:8px;
}
.hv-card .hv-text .d{
  font-size:13px; opacity:.75; line-height:1.5;
}
.hv-card .hv-foot{
  display:flex; justify-content:flex-end;
  border-top:1px solid rgba(255,255,255,.15);
  margin-top:20px; padding-top:14px;
}
.hv-card .hv-arrow{
  width:34px; height:34px; border-radius:50%;
  background:rgba(255,255,255,.15); display:grid; place-items:center;
  transition:all .25s ease;
}
.hv-card:hover .hv-arrow{background:rgba(255,255,255,.28); transform:translateX(4px)}
.hv-pro{background:linear-gradient(155deg, var(--c-pro-navy) 0%, #0e1a3a 100%)}
.hv-dep{background:linear-gradient(155deg, var(--c-dep-rouge) 0%, #8B1F14 100%)}
.hv-car{background:linear-gradient(155deg, var(--c-car-bleu) 0%, #0B3D6B 100%)}

/* Hero variant: text-only */
.hero[data-hero="editorial"] .hero-grid{grid-template-columns:1fr; max-width:920px; margin:0 auto; text-align:center}
.hero[data-hero="editorial"] .hero-visual{display:none}
.hero[data-hero="editorial"] h1{margin-left:auto; margin-right:auto; font-size:80px}
.hero[data-hero="editorial"] .lede{margin-left:auto; margin-right:auto}
.hero[data-hero="editorial"] .hero-cta{justify-content:center}
.hero[data-hero="editorial"] .hero-meta{justify-content:center}

/* Hero variant: full bleed photo placeholder */
.hero[data-hero="immersive"]{
  background:var(--c-vert-nuit);
  position:relative;
}
.hero[data-hero="immersive"]::before{
  content:""; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(46,204,113,.15), transparent 60%),
    radial-gradient(ellipse 60% 50% at 20% 80%, rgba(13,92,58,.5), transparent 60%),
    repeating-linear-gradient(115deg, rgba(255,255,255,.018) 0px, rgba(255,255,255,.018) 1px, transparent 1px, transparent 80px),
    repeating-linear-gradient(25deg, rgba(255,255,255,.018) 0px, rgba(255,255,255,.018) 1px, transparent 1px, transparent 80px),
    var(--c-vert-nuit);
  width:auto; height:auto; right:auto; top:auto; border-radius:0;
}
.hero[data-hero="immersive"]::after{display:none}
.hero[data-hero="immersive"] .hero-visual{display:none}
.hero[data-hero="immersive"] .hero-grid{grid-template-columns:1fr; max-width:1000px; margin:0 auto}
.hero[data-hero="immersive"] h1{font-size:88px; max-width:none}

/* ─── SECTION HEAD ─── */
.section{padding:120px 0; position:relative}
.section-head{
  display:grid; grid-template-columns:1fr 1.2fr; gap:80px;
  align-items:end; margin-bottom:64px;
}
.section-head .lbl{
  font-family:var(--ff-mono); font-size:11px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--c-vert-foret); margin-bottom:18px;
  display:flex; align-items:center; gap:14px;
}
.section-head .lbl::before{
  content:""; width:36px; height:1px; background:var(--c-vert-foret);
}
.section-head h2{
  font-size:48px; line-height:1.05; letter-spacing:-.025em;
  font-weight:600; margin:0; color:var(--c-vert-nuit);
}
.section-head .desc{
  font-size:16px; color:var(--c-gris-500); line-height:1.6;
  max-width:480px;
}

/* ─── ACTIVITY CARDS ─── */
.activities{
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
}
.act-card{
  border-radius:20px; padding:34px 30px 30px;
  color:#fff; position:relative; overflow:hidden;
  display:flex; flex-direction:column;
  min-height:440px;
  cursor:pointer; transition:transform .3s ease, box-shadow .3s ease;
  text-decoration:none;
}
.act-card:hover{transform:translateY(-4px); box-shadow:0 20px 48px rgba(1,42,26,.18)}
.act-card .ac-label{
  font-family:var(--ff-mono); font-size:11px; letter-spacing:.14em;
  text-transform:uppercase; opacity:.75; margin-bottom:auto;
}
.act-card h3{
  font-size:30px; font-weight:600; letter-spacing:-.02em;
  margin:24px 0 8px; line-height:1.1;
}
.act-card .ac-desc{
  font-size:14.5px; opacity:.86; margin:0 0 24px;
  max-width:320px; line-height:1.5;
}
.act-card .ac-list{
  list-style:none; margin:0 0 28px; padding:0;
  display:flex; flex-direction:column; gap:6px;
  font-size:13.5px; opacity:.85;
}
.act-card .ac-list li{display:flex; align-items:center; gap:8px}
.act-card .ac-list li svg{flex-shrink:0; opacity:.85}
.act-card .ac-foot{
  display:flex; align-items:center; justify-content:center;
  border-top:1px solid rgba(255,255,255,.18); padding-top:18px;
}
.act-card .ac-foot .url{
  font-family:var(--ff-mono); font-size:11.5px; opacity:.7;
  letter-spacing:.02em;
}
.act-card .ac-foot .arrow{
  width:44px; height:44px; border-radius:50%;
  background:rgba(255,255,255,.16);
  display:grid; place-items:center;
  transition:all .25s ease;
}
.act-card:hover .ac-foot .arrow{
  background:rgba(255,255,255,.32);
  transform:translateX(6px);
}

.act-pro{background:linear-gradient(155deg, var(--c-vert-nuit) 0%, var(--c-pro-navy) 100%)}
.act-pro .ac-label{color:var(--c-vert-accent)}
.act-dep{background:linear-gradient(155deg, var(--c-dep-rouge) 0%, #8B1F14 100%)}
.act-dep .ac-label{color:#FED7CD}
.act-car{background:linear-gradient(155deg, var(--c-car-bleu) 0%, #0B3D6B 100%)}
.act-car .ac-label{color:var(--c-car-bleu-pastel)}

/* "Soft" activity card variant */
.activities[data-style="soft"] .act-card{
  background:#fff !important; color:var(--c-noir-doux);
  border:1px solid var(--c-gris-200);
}
.activities[data-style="soft"] .act-card::before{
  content:""; position:absolute; left:0; top:0; bottom:0;
  width:5px; border-radius:5px 0 0 5px;
}
.activities[data-style="soft"] .act-pro::before{background:linear-gradient(180deg, var(--c-vert-nuit), var(--c-vert-accent))}
.activities[data-style="soft"] .act-dep::before{background:linear-gradient(180deg, var(--c-dep-rouge), var(--c-dep-orange))}
.activities[data-style="soft"] .act-car::before{background:linear-gradient(180deg, var(--c-car-bleu), var(--c-car-bleu-pastel))}
.activities[data-style="soft"] .act-card .ac-label{color:var(--c-vert-foret)}
.activities[data-style="soft"] .act-dep .ac-label{color:var(--c-dep-rouge)}
.activities[data-style="soft"] .act-car .ac-label{color:var(--c-car-bleu)}
.activities[data-style="soft"] .act-card h3{color:var(--c-vert-nuit)}
.activities[data-style="soft"] .act-pro h3{color:var(--c-vert-nuit)}
.activities[data-style="soft"] .act-dep h3{color:var(--c-dep-rouge)}
.activities[data-style="soft"] .act-car h3{color:var(--c-car-bleu)}
.activities[data-style="soft"] .act-card .ac-desc{color:var(--c-gris-500); opacity:1}
.activities[data-style="soft"] .act-card .ac-list{color:var(--c-noir-doux); opacity:1}
.activities[data-style="soft"] .act-card .ac-list li svg{color:var(--c-vert-foret)}
.activities[data-style="soft"] .act-dep .ac-list li svg{color:var(--c-dep-rouge)}
.activities[data-style="soft"] .act-car .ac-list li svg{color:var(--c-car-bleu)}
.activities[data-style="soft"] .act-card .ac-foot{border-top-color:var(--c-gris-200)}
.activities[data-style="soft"] .act-card .url{color:var(--c-gris-500); opacity:1}
.activities[data-style="soft"] .act-pro .ac-foot .arrow{background:var(--c-vert-nuit); color:#fff}
.activities[data-style="soft"] .act-dep .ac-foot .arrow{background:var(--c-dep-rouge); color:#fff}
.activities[data-style="soft"] .act-car .ac-foot .arrow{background:var(--c-car-bleu); color:#fff}

/* "Stacked" variant — bigger feature card for SEA priority */
.activities[data-style="stacked"]{
  grid-template-columns:1.5fr 1fr;
  grid-template-rows:auto auto;
  gap:18px;
}
.activities[data-style="stacked"] .act-dep{
  grid-row:1 / span 2; min-height:600px;
}
.activities[data-style="stacked"] .act-dep h3{font-size:42px}
.activities[data-style="stacked"] .act-dep .ac-desc{font-size:16px; max-width:380px}
.activities[data-style="stacked"] .act-pro,
.activities[data-style="stacked"] .act-car{min-height:290px}

/* ─── POURQUOI CLINICAUTO ─── */
.why-section{background:#fff; padding:120px 0; border-top:1px solid var(--c-gris-200); border-bottom:1px solid var(--c-gris-200)}
.why-grid{
  display:grid; grid-template-columns:repeat(3, 1fr); gap:28px;
}
.why-card{
  display:flex; gap:22px; padding:32px;
  background:var(--c-blanc-casse);
  border-radius:16px;
  border:1px solid var(--c-gris-200);
}
.why-card .why-ico{
  width:48px; height:48px; border-radius:12px;
  background:var(--c-vert-nuit); color:var(--c-vert-accent);
  display:grid; place-items:center;
  flex-shrink:0;
}
.why-card h4{
  margin:0 0 8px; font-size:19px; font-weight:600; letter-spacing:-.01em;
  color:var(--c-vert-nuit);
}
.why-card p{margin:0; font-size:14.5px; color:var(--c-gris-500); line-height:1.55}

/* ─── STATS / EN CHIFFRES ─── */
.stats-section{
  background:var(--c-vert-nuit); color:#fff;
  padding:120px 0;
  position:relative; overflow:hidden;
}
.stats-section::before{
  content:""; position:absolute; left:-200px; top:50%; transform:translateY(-50%);
  width:500px; height:500px; border-radius:50%;
  background:radial-gradient(circle, rgba(46,204,113,.1), transparent 70%);
}
.stats-grid{
  display:grid; grid-template-columns:repeat(4, 1fr); gap:36px;
  position:relative; z-index:1;
}
.stat-block{
  border-left:1px solid rgba(255,255,255,.12); padding-left:24px;
}
.stat-block:first-child{border-left:none; padding-left:0}
.stat-block .num{
  font-size:64px; font-weight:600; line-height:1; letter-spacing:-.03em;
  color:#fff; margin-bottom:14px; display:flex; align-items:baseline; gap:6px;
}
.stat-block .num small{font-size:24px; opacity:.7; font-weight:500}
.stat-block .num em{font-style:normal; color:var(--c-vert-accent)}
.stat-block h5{
  margin:0 0 6px; font-size:15px; font-weight:600; color:#fff;
}
.stat-block p{
  margin:0; font-size:13px; color:rgba(255,255,255,.55); line-height:1.5;
}

/* ─── FINAL CTA ─── */
.cta-section{
  padding:100px 0; background:var(--c-blanc-casse);
  text-align:center;
}
.cta-section h2{
  font-size:48px; line-height:1.05; letter-spacing:-.025em; font-weight:600;
  margin:0 0 16px; color:var(--c-vert-nuit); max-width:760px; margin-left:auto; margin-right:auto;
}
.cta-section p{
  font-size:17px; color:var(--c-gris-500); margin:0 auto 32px; max-width:580px;
}
.cta-row{display:flex; gap:14px; justify-content:center; flex-wrap:wrap}

/* ─── FOOTER ─── */
.footer{
  background:var(--c-vert-nuit); color:rgba(255,255,255,.7);
  padding:80px 0 32px;
}
.footer-grid{
  display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:48px;
  padding-bottom:56px; border-bottom:1px solid rgba(255,255,255,.1);
}
.footer .wordmark{margin-bottom:18px}
.footer-tagline{font-size:14px; color:rgba(255,255,255,.55); line-height:1.55; max-width:280px; margin-bottom:24px}
.footer-contact{font-size:14px; color:rgba(255,255,255,.78); display:flex; flex-direction:column; gap:6px}
.footer-contact strong{color:#fff; font-weight:500; display:block}
.footer-col h6{
  font-family:var(--ff-mono); font-size:11px; letter-spacing:.12em;
  text-transform:uppercase; color:rgba(255,255,255,.45);
  margin:0 0 18px; font-weight:600;
}
.footer-col ul{list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:10px; font-size:14px}
.footer-col a:hover{color:#fff; text-decoration:underline}
.footer-bottom{
  display:flex; justify-content:space-between; align-items:center;
  padding-top:24px; font-size:13px; color:rgba(255,255,255,.4);
}
.footer-legal{display:flex; gap:24px}

/* Responsive */
@media (max-width: 980px){
  .hero h1{font-size:44px}
  .hero[data-hero="editorial"] h1, .hero[data-hero="immersive"] h1{font-size:54px}
  .hero-visual{grid-template-columns:1fr; margin-top:32px}
  .section-head{grid-template-columns:1fr; gap:24px}
  .section-head h2{font-size:36px}
  .activities, .activities[data-style="stacked"]{grid-template-columns:1fr; grid-template-rows:auto}
  .activities[data-style="stacked"] .act-dep{grid-row:auto}
  .why-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr; gap:24px}
  .stat-block{border-left:none; padding-left:0; border-top:1px solid rgba(255,255,255,.12); padding-top:24px}
  .stat-block:first-child{border-top:none; padding-top:0}
  .footer-grid{grid-template-columns:1fr 1fr; gap:32px}
  .nav-links{display:none}
  .nav-mobile-group{display:flex; align-items:center; gap:10px}
  .cta-section h2{font-size:32px}
}
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

/* TWEAK DEFAULTS — directly editable */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroStyle": "split",
  "cardStyle": "vibrant",
  "heroHeadline": "trois expertise, une seule exigence.",
  "heroAccent": "",
  "showStats": true
}/*EDITMODE-END*/;

/* Icons */
const Ico = {
  Arrow: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>,
  Phone: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>,
  Check: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M20 6L9 17l-5-5"/></svg>,
  Garage: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 21V9l9-6 9 6v12M9 21V13h6v8"/></svg>,
  Shield: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  Clock: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
  Hand: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 11V6a2 2 0 0 1 4 0v5M13 11V4a2 2 0 0 1 4 0v9M17 13V8a2 2 0 0 1 4 0v8a6 6 0 0 1-6 6h-2c-3 0-5-2-6-4l-2-4a2 2 0 0 1 3-3l2 2"/></svg>,
  Pin: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="10" r="3"/><path d="M12 22s7-7.5 7-12a7 7 0 0 0-14 0c0 4.5 7 12 7 12z"/></svg>,
  Star: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/></svg>,
  CarBig: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 11h18l-2-5a2 2 0 0 0-2-1H7a2 2 0 0 0-2 1l-2 5zM3 11v6h2v-2h14v2h2v-6M7 14h.01M17 14h.01"/></svg>,
  Wrench: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18l3 3 6.3-6.3a4 4 0 0 0 5.4-5.4l-2.5 2.5-2.5-1-1-2.5 2.5-2.5z"/></svg>,
};

function Wordmark({ size = 19, glyph = true, accent }){
  return (
    <div className="wordmark" style={{ fontSize: size }}>
      {glyph && <div className="glyph" style={{ width: size*1.5, height: size*1.5, fontSize: size*.75 }}>C</div>}
      <span>Clinic<span className="accent" style={accent ? {color:accent} : null}>Auto</span></span>
    </div>
  );
}

function Nav(){
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  useEffect(() => {
    document.body.style.overflow = menuOpen ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [menuOpen]);
  return (
    <>
      <nav className={`topnav ${scrolled ? 'scrolled' : ''}`}>
        <div className="container">
          <a href="index.html" aria-label="ClinicAuto"><Wordmark /></a>
          <div className="nav-links">
            <a className="nav-link pro" href="https://clinic-auto-pro-ecommerce-nextjs-no.vercel.app/" target="_blank" rel="noopener noreferrer"><span className="swatch"></span>Pro</a>
            <a className="nav-link dep" href="depannage.html"><span className="swatch"></span>Dépannage</a>
            <a className="nav-link car" href="carrosserie.html"><span className="swatch"></span>Carrosserie</a>
            <a className="btn btn-accent btn-sm nav-cta" href="tel:+33186932480" style={{padding:'8px 14px', fontSize:13, marginLeft:14}}>
              <Ico.Phone /> 01 86 93 24 80
            </a>
          </div>
          <div className="nav-mobile-group">
            <a className="nav-mobile-call" href="tel:+33186932480" aria-label="Appeler ClinicAuto"><Ico.Phone /></a>
            <button className={`nav-burger ${menuOpen ? 'open' : ''}`} onClick={() => setMenuOpen(o => !o)} aria-label="Menu">
              <span/><span/><span/>
            </button>
          </div>
        </div>
      </nav>

      <div className={`mobile-drawer ${menuOpen ? 'open' : ''}`}>
        <div className="mobile-drawer-backdrop" onClick={() => setMenuOpen(false)} />
        <div className="mobile-drawer-panel">
          <nav className="mobile-nav-links">
            <a className="mobile-nav-link pro" href="index.html" onClick={() => setMenuOpen(false)}>
              <span className="swatch"></span> Accueil
            </a>
            <a className="mobile-nav-link pro" href="https://clinic-auto-pro-ecommerce-nextjs-no.vercel.app/" target="_blank" rel="noopener noreferrer" onClick={() => setMenuOpen(false)}>
              <span className="swatch"></span> ClinicAuto Pro
            </a>
            <a className="mobile-nav-link dep" href="depannage.html" onClick={() => setMenuOpen(false)}>
              <span className="swatch"></span> Clinic Dépannage
            </a>
            <a className="mobile-nav-link car" href="carrosserie.html" onClick={() => setMenuOpen(false)}>
              <span className="swatch"></span> Clinic Carrosserie
            </a>
          </nav>
          <a className="mobile-drawer-cta" href="tel:+33186932480">
            <Ico.Phone /> 01 86 93 24 80
          </a>
        </div>
      </div>
    </>
  );
}

function Hero({ style, headline, accent }){
  return (
    <section className="hero" data-hero={style}>
      <div className="container">
        <div className="hero-grid">
          <div className="hero-eyebrow"><span className="dot"></span> Garage automobile · Bordeaux-Cénac</div>
            <h1>Clinic<em>Auto</em>, trois expertises, <em>une seule exigence.</em></h1>
          <div className="hero-visual">
            <a className="act-card act-pro" href="https://clinic-auto-pro-ecommerce-nextjs-no.vercel.app/" target="_blank" rel="noopener noreferrer">
              <span className="ac-label">CLINICAUTO PRO</span>
              <h3>Marché des véhicules accidentés</h3>
              <p className="ac-desc">Achat-vente entre professionnels : VEI, sinistres, épaves roulantes. Catalogue mis à jour chaque semaine.</p>
              <ul className="ac-list">
                <li><Ico.Check /> Réservé aux pros agréés</li>
                <li><Ico.Check /> Carte grise et historique disponibles</li>
                <li><Ico.Check /> Enlèvement organisé</li>
              </ul>
              <div className="ac-foot">
                <div className="arrow"><Ico.Arrow /></div>
              </div>
            </a>
            <a className="act-card act-dep" href="depannage.html" target="_blank" rel="noopener noreferrer">
              <span className="ac-label">CLINIC DÉPANNAGE · 24/7</span>
              <h3>Dépannage et remorquage</h3>
              <p className="ac-desc">Panne, accident, batterie, crevaison — partout à Bordeaux-Cénac, jour et nuit. Intervention sous 45 min.</p>
              <ul className="ac-list">
                <li><Ico.Check /> Disponible 24h/24, 7j/7</li>
                <li><Ico.Check /> Devis transparent au téléphone</li>
                <li><Ico.Check /> Paiement après l'intervention</li>
              </ul>
              <div className="ac-foot">
                <div className="arrow"><Ico.Arrow /></div>
              </div>
            </a>
            <a className="act-card act-car" href="/carrosserie" target="_blank" rel="noopener noreferrer">
              <span className="ac-label">CLINIC CARROSSERIE · ATELIER</span>
              <h3>Réparation carrosserie</h3>
              <p className="ac-desc">Tôlerie, peinture cabine, débosselage sans peinture, polissage. Devis sous 24 h, prise en charge assurance.</p>
              <ul className="ac-list">
                <li><Ico.Check /> Agréé toutes assurances</li>
                <li><Ico.Check /> Garantie peinture 2 ans</li>
                <li><Ico.Check /> Véhicule de prêt sur demande</li>
              </ul>
              <div className="ac-foot">
                <div className="arrow"><Ico.Arrow /></div>
              </div>
            </a>
          </div>
        </div>
      </div>
    </section>
  );
}


function Why(){
  const items = [
    { ico:<Ico.Garage />, t:"Un seul interlocuteur", d:"Quel que soit votre besoin, vous appelez le même numéro. Notre équipe vous oriente ensuite vers le bon spécialiste." },
    { ico:<Ico.Clock />,  t:"Délais respectés", d:"Devis sous 24 h, dépannage sous 45 min, livraison Pro sous 72 h." },
    { ico:<Ico.Hand />,   t:"Tarification transparente", d:"Devis détaillé avant toute intervention. Paiement après prestation pour le dépannage. Pas de frais cachés." },
  ];
  return (
    <section className="why-section">
      <div className="container">
        <div className="section-head">
          <div>
            <div className="lbl">Pourquoi ClinicAuto</div>
            <h2>Un garage familial<br/>au service de tous.</h2>
          </div>
          <p className="desc">
            ClinicAuto est un garage familial avec trois pôles spécialisés. On ne vend que ce qu'il faut,
            au prix qu'il faut, dans les délais qu'il faut.
          </p>
        </div>
        <div className="why-grid">
          {items.map((it, i) => (
            <div className="why-card" key={i}>
              <div className="why-ico">{it.ico}</div>
              <div>
                <h4>{it.t}</h4>
                <p>{it.d}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Stats(){
  return (
    <section className="stats-section">
      <div className="container">
        <div className="section-head" style={{marginBottom:48}}>
          <div>
            <div className="lbl" style={{color:'var(--c-vert-accent)'}}>En chiffres</div>
            <h2 style={{color:'#fff'}}>L'expérience<br/>au compteur.</h2>
          </div>
          <p className="desc" style={{color:'rgba(255,255,255,.6)'}}>
            Plus de douze ans à dépanner, vendre et réparer. Des chiffres simples qu'on aime bien partager.
          </p>
        </div>
        <div className="stats-grid">
          <div className="stat-block">
            <div className="num">12<small>ans</small></div>
            <h5>D'existence</h5>
            <p>Fondé en 2014 à Cénac (33). Trois pôles depuis 2021.</p>
          </div>
          <div className="stat-block">
            <div className="num">340<em>+</em></div>
            <h5>Pros inscrits</h5>
            <p>Garages, démolisseurs, exportateurs et carrossiers utilisent notre marché professionnel.</p>
          </div>
          <div className="stat-block">
            <div className="num">38<small>min</small></div>
            <h5>Délai moyen dépannage</h5>
            <p>Sur 412 interventions ce mois-ci, en Gironde.</p>
          </div>
          <div className="stat-block">
            <div className="num">4.8<small>/5</small></div>
            <h5>Note clients</h5>
            <p>Vérifiée Google Reviews · 218 avis sur les trois pôles.</p>
          </div>
        </div>
      </div>
    </section>
  );
}

function FinalCta(){
  return (
    <section className="cta-section">
      <div className="container">
        <h2>Une question, un devis, une panne ?<br/>On répond.</h2>
        <p>Une équipe humaine au téléphone, du lundi au samedi de 8 h à 19 h. Urgence dépannage 24h/24.</p>
        <div className="cta-row">
          <a className="btn btn-primary btn-lg" href="tel:+33186932480"><Ico.Phone /> 01 86 93 24 80</a>
          <a className="btn btn-ghost-dark btn-lg" href="mailto:contact@clinicauto.fr">contact@clinicauto.fr</a>
        </div>
      </div>
    </section>
  );
}

function Footer(){
  return (
    <footer className="footer">
      <div className="container">
        <div className="footer-grid">
          <div>
            <Wordmark />
            <p className="footer-tagline">Garage, vente B2B et carrosserie. Trois métiers, une équipe, depuis 2014.</p>
            <div className="footer-contact">
              <strong>ClinicAuto SAS</strong>
              <span>ZA Bel Air, 33360 Cénac</span>
              <span>01 86 93 24 80 · contact@clinicauto.fr</span>
            </div>
          </div>
          <div className="footer-col">
            <h6>Activités</h6>
            <ul>
              <li><a href="/pro">ClinicAuto Pro</a></li>
              <li><a href="depannage.html">Clinic Dépannage</a></li>
              <li><a href="/carrosserie">Clinic Carrosserie</a></li>
            </ul>
          </div>
          <div className="footer-col">
            <h6>Société</h6>
            <ul>
              <li><a href="#">À propos</a></li>
              <li><a href="#">Recrutement</a></li>
              <li><a href="#">Presse</a></li>
              <li><a href="#">Contact</a></li>
            </ul>
          </div>
          <div className="footer-col">
            <h6>Légal</h6>
            <ul>
              <li><a href="#">Mentions légales</a></li>
              <li><a href="#">CGV / CGU</a></li>
              <li><a href="#">Politique RGPD</a></li>
              <li><a href="#">Cookies</a></li>
            </ul>
          </div>
        </div>
        <div className="footer-bottom">
          <span>© 2026 ClinicAuto SAS · RCS Bobigny 894 217 506</span>
          <div className="footer-legal">
            <span>Capital 50 000 €</span>
            <span>TVA FR 39 894 217 506</span>
          </div>
        </div>
      </div>
    </footer>
  );
}

/* TWEAKS PANEL */
function Panel({ tweaks, setTweak }){
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Hero">
        <TweakSelect label="Style"
          value={tweaks.heroStyle} onChange={v => setTweak('heroStyle', v)}
          options={[
            { value:'split', label:'Split (texte + cartes)' },
            { value:'editorial', label:'Éditorial (centré, sans visuel)' },
            { value:'immersive', label:'Immersif (titre géant)' },
          ]} />
        <TweakText label="Titre principal"
          value={tweaks.heroHeadline} onChange={v => setTweak('heroHeadline', v)} />
        <TweakText label="Accent (en vert)"
          value={tweaks.heroAccent} onChange={v => setTweak('heroAccent', v)} />
      </TweakSection>
      <TweakSection label="Sections">
        <TweakToggle label="Afficher la section En chiffres"
          value={tweaks.showStats} onChange={v => setTweak('showStats', v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

function App(){
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <Nav />
      <Hero style={tweaks.heroStyle} headline={tweaks.heroHeadline} accent={tweaks.heroAccent} />
      <Why />
      {tweaks.showStats && <Stats />}
      <FinalCta />
      <Footer />
      <Panel tweaks={tweaks} setTweak={setTweak} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
