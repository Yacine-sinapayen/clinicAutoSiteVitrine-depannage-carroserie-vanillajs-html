<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clinic Mécanique — Entretien & réparation auto en Gironde</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
:root{
  --c-vert-nuit:#012A1A;
  --c-vert-foret:#0D5C3A;
  --c-vert-accent:#2ECC71;
  --c-blanc-casse:#F5F5F0;
  --c-noir-doux:#1A1A1A;
  --c-gris-100:#EEEEE8;
  --c-gris-200:#DDDDD5;
  --c-gris-300:#BFBFB6;
  --c-gris-400:#8C8C85;
  --c-gris-500:#5A5A55;

  --c-mec-acier:#1A2332;
  --c-mec-acier-2:#243047;
  --c-mec-acier-3:#0D1520;
  --c-mec-ambre:#D97706;
  --c-mec-ambre-clair:#F59E0B;
  --c-mec-ambre-dark:#92400E;
  --c-mec-ambre-bg:#FFFBEB;
  --c-mec-ambre-border:#FDE68A;
  --c-dep-rouge:#C0392B;
  --c-car-bleu:#1565A8;

  --ff-sans:"Inter", system-ui, -apple-system, sans-serif;
  --ff-mono:"JetBrains Mono", ui-monospace, Menlo, monospace;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--ff-sans);
  color:var(--c-noir-doux);
  background:#fff;
  font-size:15px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
a{color:inherit; text-decoration:none}
button{font-family:inherit; cursor:pointer; border:none}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--ff-sans); font-weight:600; font-size:14px;
  padding:11px 20px; border-radius:10px;
  border:1px solid transparent; cursor:pointer;
  transition:all .15s ease; white-space:nowrap;
}
.btn-mec{background:var(--c-mec-ambre); color:#fff}
.btn-mec:hover{background:var(--c-mec-ambre-dark)}
.btn-ghost{background:transparent; color:#fff; border-color:rgba(255,255,255,.3)}
.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-ghost-dark{background:transparent; color:var(--c-noir-doux); border:1.5px solid var(--c-gris-200)}
.btn-ghost-dark:hover{background:var(--c-gris-100)}
.btn-lg{padding:14px 24px; font-size:15px; border-radius:12px}
.btn-xl{padding:16px 28px; font-size:16px; border-radius:12px; font-weight:700}

/* ─── NAVBAR ─── */
.topnav{
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:#fff;
  border-bottom:1px solid var(--c-gris-200);
  padding:0;
}
.topnav .inner{
  max-width:1280px; margin:0 auto; padding:0 32px;
  height:64px;
  display:flex; align-items:center; justify-content:space-between;
}
.nav-brand{
  display:inline-flex; align-items:center; gap:10px;
  font-weight:700; font-size:18px; letter-spacing:-.015em;
  color:var(--c-noir-doux);
}
.nav-brand .glyph{
  width:34px; height:34px; border-radius:9px;
  background:linear-gradient(135deg, var(--c-mec-ambre-clair) 0%, var(--c-mec-ambre-dark) 100%);
  display:grid; place-items:center; color:#fff; font-weight:800; font-size:15px;
  flex-shrink:0;
}
.nav-brand .brand-name span{color:var(--c-mec-ambre)}
.nav-right{display:flex; align-items:center; gap:20px}
.nav-tag{
  font-size:13.5px; color:var(--c-gris-500);
  display:flex; align-items:center; gap:6px;
}
.nav-tag svg{color:var(--c-mec-ambre)}

/* ─── UNIVERSE NAV LINKS ─── */
.nav-universe-links{display:flex; gap:2px; align-items:center}
.nav-uni-link{
  color:var(--c-gris-500); padding:7px 12px; border-radius:8px;
  font-size:13.5px; font-weight:500; transition:all .15s ease;
  display:flex; align-items:center; gap:7px; white-space:nowrap;
}
.nav-uni-link:hover{color:var(--c-noir-doux); background:var(--c-gris-100)}
.nav-uni-link .swatch{width:7px; height:7px; border-radius:50%; flex-shrink:0}
.nav-uni-link.pro .swatch{background:#2ECC71}
.nav-uni-link.dep .swatch{background:#E74C3C}
.nav-uni-link.mec .swatch{background:#F59E0B}
.nav-uni-link.car .swatch{background:#1976D2}
.nav-uni-link.active{color:var(--c-noir-doux); font-weight:600; background:var(--c-gris-100)}
.nav-mobile-group{display:none; align-items:center; gap:10px}
.nav-mobile-call{display:grid; width:38px; height:38px; border-radius:50%; color:#fff; place-items:center; flex-shrink:0}
.nav-burger{
  display:flex; flex-direction:column; justify-content:center; gap:5px;
  width:38px; height:38px; border-radius:9px; padding:10px;
  background:var(--c-gris-100); cursor:pointer; border:none; flex-shrink:0;
}
.nav-burger span{display:block; height:2px; border-radius:2px; background:var(--c-noir-doux); transition:all .25s ease}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-burger.open span:nth-child(2){opacity:0; transform:scaleX(0)}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-drawer{position:fixed; inset:0; z-index:49; pointer-events:none}
.mobile-drawer-backdrop{position:absolute; inset:0; background:rgba(0,0,0,.45); opacity:0; transition:opacity .3s ease}
.mobile-drawer-panel{
  position:absolute; top:0; right:0; bottom:0; width:min(300px, 85vw);
  background:var(--c-vert-nuit); padding:80px 24px 36px;
  display:flex; flex-direction:column;
  transform:translateX(100%); transition:transform .3s ease;
  border-left:1px solid rgba(255,255,255,.08);
}
.mobile-drawer.open{pointer-events:all}
.mobile-drawer.open .mobile-drawer-backdrop{opacity:1}
.mobile-drawer.open .mobile-drawer-panel{transform:translateX(0)}
.mobile-nav-links{display:flex; flex-direction:column; gap:4px; margin-bottom:auto}
.mobile-nav-link{
  display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:12px;
  color:#fff; font-size:16px; font-weight:500; transition:background .15s ease;
}
.mobile-nav-link:hover{background:rgba(255,255,255,.07)}
.mobile-nav-link.active{background:rgba(255,255,255,.1); font-weight:600}
.mobile-nav-link .swatch{width:9px; height:9px; border-radius:50%; flex-shrink:0}
.mobile-nav-link.pro .swatch{background:#2ECC71}
.mobile-nav-link.dep .swatch{background:#E74C3C}
.mobile-nav-link.mec .swatch{background:#F59E0B}
.mobile-nav-link.car .swatch{background:#1976D2}
.mobile-drawer-cta{
  display:flex; align-items:center; gap:10px; padding:14px 18px; border-radius:12px;
  margin-top:20px; font-weight:600; font-size:15px; justify-content:center; color:#fff;
}

/* ─── HERO MÉCANIQUE ─── */
.hero-mec{
  background:linear-gradient(148deg, var(--c-mec-acier-3) 0%, var(--c-mec-acier) 55%, var(--c-mec-acier-2) 100%);
  color:#fff;
  padding:108px 0 0;
  position:relative; overflow:hidden;
}
.hero-mec::before{
  content:""; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 70% at 80% 20%, rgba(245,158,11,.08), transparent 60%),
    radial-gradient(ellipse 50% 60% at 5% 90%, rgba(0,0,0,.3), transparent 55%),
    repeating-linear-gradient(115deg, rgba(255,255,255,.012) 0px, rgba(255,255,255,.012) 1px, transparent 1px, transparent 80px),
    repeating-linear-gradient(25deg, rgba(255,255,255,.008) 0px, rgba(255,255,255,.008) 1px, transparent 1px, transparent 80px);
  pointer-events:none;
}
.hero-mec .container{
  max-width:1280px; margin:0 auto; padding:0 32px;
  position:relative; z-index:1;
}
.hero-grid{
  display:grid; grid-template-columns:1.1fr .9fr;
  gap:56px; align-items:center;
  padding:72px 0 80px;
}

/* Badge */
.status-badge{
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(8px);
  padding:7px 14px; border-radius:999px;
  font-size:13px; font-weight:500; color:rgba(255,255,255,.9);
  margin-bottom:28px;
}
.status-dot{
  width:8px; height:8px; border-radius:50%; background:var(--c-mec-ambre-clair);
  box-shadow:0 0 0 3px rgba(245,158,11,.25);
  flex-shrink:0;
}

/* H1 */
.hero-mec h1{
  font-size:62px; line-height:1.03; letter-spacing:-.035em;
  font-weight:800; margin:0 0 20px;
}
.hero-mec h1 .accent{color:var(--c-mec-ambre-clair)}

/* Lede */
.hero-mec .lede{
  font-size:16.5px; color:rgba(255,255,255,.72); line-height:1.6;
  max-width:480px; margin:0 0 36px;
}

/* Phone card */
.phone-card{
  display:inline-flex; align-items:center; gap:16px;
  background:#fff; border-radius:16px;
  padding:18px 24px;
  box-shadow:0 8px 32px rgba(0,0,0,.22);
  margin-bottom:16px;
}
.phone-card .phone-ico-wrap{
  width:46px; height:46px; border-radius:12px;
  background:var(--c-mec-ambre-bg); color:var(--c-mec-ambre);
  display:grid; place-items:center; flex-shrink:0;
}
.phone-card .phone-label{
  font-family:var(--ff-mono); font-size:10.5px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--c-gris-400); margin-bottom:3px;
}
.phone-card .phone-num{
  font-size:24px; font-weight:800; letter-spacing:-.02em;
  color:var(--c-noir-doux); line-height:1;
}
.callback-link{
  display:inline-flex; align-items:center; gap:6px;
  font-size:13.5px; color:rgba(255,255,255,.65);
  transition:color .15s;
}
.callback-link:hover{color:#fff}

/* Stats card hero (right) */
.atelier-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(16px);
  border-radius:22px;
  padding:32px;
}
.atelier-card .ac-label{
  font-family:var(--ff-mono); font-size:10.5px; letter-spacing:.16em;
  text-transform:uppercase; color:rgba(255,255,255,.45);
  margin-bottom:16px;
}
.atelier-card .ac-big{
  font-size:72px; font-weight:800; letter-spacing:-.04em;
  line-height:1; color:#fff; margin-bottom:2px;
  display:flex; align-items:baseline; gap:8px;
}
.atelier-card .ac-big small{font-size:26px; font-weight:600; opacity:.7}
.atelier-card .ac-sub{font-size:13px; color:rgba(255,255,255,.5); margin-bottom:26px}
.atelier-card .ac-divider{height:1px; background:rgba(255,255,255,.1); margin-bottom:22px}
.atelier-card .ac-row{display:grid; grid-template-columns:1fr 1fr; gap:0}
.atelier-card .ac-mini-label{
  font-family:var(--ff-mono); font-size:10px; letter-spacing:.12em;
  text-transform:uppercase; color:rgba(255,255,255,.38); margin-bottom:5px;
}
.atelier-card .ac-mini-val{font-size:22px; font-weight:700; color:#fff; letter-spacing:-.02em}
.atelier-card .ac-row .ac-mini:last-child{
  border-left:1px solid rgba(255,255,255,.1); padding-left:22px;
}
.atelier-card .ac-badges{
  display:flex; flex-direction:column; gap:10px; margin-top:22px;
}
.atelier-card .ac-badge{
  display:flex; align-items:center; gap:12px;
  background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.2);
  border-radius:12px; padding:10px 14px;
  font-size:13px; color:rgba(255,255,255,.8);
}
.atelier-card .ac-badge svg{color:var(--c-mec-ambre-clair); flex-shrink:0}

/* ─── TRUST BAR ─── */
.trust-bar{
  background:var(--c-blanc-casse);
  border-bottom:1px solid var(--c-gris-200);
  padding:0;
}
.trust-bar .inner{
  max-width:1280px; margin:0 auto; padding:0 32px;
  display:grid; grid-template-columns:repeat(4,1fr);
}
.trust-item{
  display:flex; align-items:center; gap:14px;
  padding:24px 0;
  border-right:1px solid var(--c-gris-200);
  padding-right:24px; padding-left:24px;
}
.trust-item:first-child{padding-left:0}
.trust-item:last-child{border-right:none}
.trust-ico{
  width:42px; height:42px; border-radius:11px;
  background:var(--c-mec-ambre-bg); color:var(--c-mec-ambre);
  display:grid; place-items:center; flex-shrink:0;
}
.trust-item h5{margin:0 0 2px; font-size:14.5px; font-weight:700; color:var(--c-noir-doux)}
.trust-item p{margin:0; font-size:12.5px; color:var(--c-gris-400); line-height:1.35}

/* ─── SECTIONS ─── */
.section{padding:96px 0}
.container{max-width:1280px; margin:0 auto; padding:0 32px}
.section-head{
  display:flex; flex-direction:row; gap:64px;
  align-items:start; margin-bottom:56px; width:100%;
}
.lbl{
  font-family:var(--ff-mono); font-size:13px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--c-mec-ambre);
  margin:0; display:flex; align-items:center; gap:12px; width:50%;
}
.lbl::before{content:""; width:28px; height:1px; background:var(--c-mec-ambre)}
.section-head h2{
  font-size:44px; line-height:1.06; letter-spacing:-.025em;
  font-weight:700; margin:0; color:var(--c-vert-nuit);
}
.section-head .desc{font-size:15.5px; color:var(--c-gris-500); line-height:1.65; margin:0; width:50%}

/* ─── SERVICES ─── */
.services-section{background:#fff; border-top:1px solid var(--c-gris-200)}
.services-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px}
.srv-card{
  padding:24px 26px; border-radius:18px;
  border:1px solid var(--c-gris-200);
  background:var(--c-blanc-casse);
  display:flex; flex-direction:column; gap:12px;
  transition:all .2s ease;
}
.srv-card:hover{
  border-color:rgba(217,119,6,.3);
  box-shadow:0 6px 24px rgba(217,119,6,.08);
  transform:translateY(-2px);
}
.srv-ico{
  width:48px; height:48px; border-radius:12px;
  background:var(--c-mec-ambre-bg); color:var(--c-mec-ambre);
  display:grid; place-items:center;
}
.srv-card h4{margin:0; font-size:15px; font-weight:700; color:var(--c-vert-nuit)}
.srv-card p{margin:0; font-size:13px; color:var(--c-gris-500); line-height:1.5}
.srv-tag{
  display:inline-flex; font-family:var(--ff-mono); font-size:10.5px;
  letter-spacing:.06em; color:var(--c-mec-ambre);
  background:var(--c-mec-ambre-bg); padding:4px 10px; border-radius:20px;
  margin-top:auto; font-weight:600;
}

/* ─── URGENCY BANNER ─── */
.urgency-banner{
  background:linear-gradient(135deg, var(--c-mec-acier-3) 0%, var(--c-mec-acier) 60%, var(--c-mec-acier-2) 100%);
  padding:56px 0; text-align:center; color:#fff; position:relative; overflow:hidden;
}
.urgency-banner::before{
  content:""; position:absolute; inset:0;
  background:repeating-linear-gradient(135deg, rgba(255,255,255,.02) 0px, rgba(255,255,255,.02) 1px, transparent 1px, transparent 60px);
  pointer-events:none;
}
.urgency-banner::after{
  content:""; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:600px; height:300px; border-radius:50%;
  background:radial-gradient(ellipse, rgba(245,158,11,.06), transparent 70%);
  pointer-events:none;
}
.urgency-banner .ub-inner{position:relative; z-index:1}
.urgency-banner .ub-label{
  font-family:var(--ff-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--c-mec-ambre-clair); margin-bottom:14px;
}
.urgency-banner h2{font-size:42px; font-weight:700; letter-spacing:-.03em; margin:0 0 12px}
.urgency-banner p{font-size:16px; color:rgba(255,255,255,.72); margin:0 auto 28px; max-width:520px}
.ub-row{display:flex; gap:12px; justify-content:center; flex-wrap:wrap}

/* ─── COMMENT ÇA MARCHE ─── */
.how-section{background:var(--c-blanc-casse); border-top:1px solid var(--c-gris-200)}
.steps-grid{
  display:grid; grid-template-columns:repeat(4,1fr); gap:0;
  position:relative;
}
.steps-grid::before{
  content:""; position:absolute;
  top:33px; left:calc(12.5% + 20px); right:calc(12.5% + 20px);
  height:1px; background:var(--c-gris-200); z-index:0;
}
.step{display:flex; flex-direction:column; align-items:center; text-align:center; padding:0 20px; position:relative; z-index:1}
.step-ico{
  width:66px; height:66px; border-radius:50%;
  background:#fff; border:2px solid var(--c-gris-200);
  display:grid; place-items:center;
  color:var(--c-mec-ambre); margin-bottom:22px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  transition:all .2s ease;
}
.step:hover .step-ico{background:var(--c-mec-ambre); color:#fff; border-color:var(--c-mec-ambre)}
.step h4{margin:0 0 6px; font-size:16px; font-weight:700; color:var(--c-vert-nuit)}
.step p{margin:0; font-size:13.5px; color:var(--c-gris-500); line-height:1.5}

/* ─── POURQUOI NOUS (dark) ─── */
.why-mec-section{background:var(--c-mec-acier); color:#fff; padding:96px 0; position:relative; overflow:hidden}
.why-mec-section::before{
  content:""; position:absolute; right:-150px; top:-150px;
  width:420px; height:420px; border-radius:50%;
  background:radial-gradient(circle, rgba(245,158,11,.06), transparent 65%);
  pointer-events:none;
}
.why-mec-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px; position:relative; z-index:1}
.why-mec-card{
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
  border-radius:18px; padding:26px 28px;
  display:flex; gap:18px; align-items:flex-start; transition:all .2s ease;
}
.why-mec-card:hover{background:rgba(255,255,255,.07)}
.wmc-ico{
  width:46px; height:46px; border-radius:12px;
  background:rgba(217,119,6,.2); color:var(--c-mec-ambre-clair);
  display:grid; place-items:center; flex-shrink:0;
}
.wmc-body h4{margin:0 0 5px; font-size:16px; font-weight:700}
.wmc-body p{margin:0; font-size:13.5px; color:rgba(255,255,255,.5); line-height:1.5}

/* ─── STATS ─── */
.stats-mec-section{
  background:linear-gradient(135deg, var(--c-mec-acier-3) 0%, var(--c-mec-ambre-dark) 60%, var(--c-mec-ambre) 100%);
  color:#fff; padding:96px 0; position:relative; overflow:hidden;
}
.stats-mec-section::before{
  content:""; position:absolute; inset:0;
  background:repeating-linear-gradient(115deg, rgba(255,255,255,.02) 0px, rgba(255,255,255,.02) 1px, transparent 1px, transparent 80px);
  pointer-events:none;
}
.stats-mec-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:0; position:relative; z-index:1}
.stat-mec-block{border-left:1px solid rgba(255,255,255,.15); padding-left:28px}
.stat-mec-block:first-child{border-left:none; padding-left:0}
.stat-mec-block .num{font-size:56px; font-weight:800; line-height:1; letter-spacing:-.03em; margin-bottom:10px; display:flex; align-items:baseline; gap:6px}
.stat-mec-block .num small{font-size:20px; opacity:.65; font-weight:500}
.stat-mec-block .num em{font-style:normal; color:var(--c-mec-acier-3)}
.stat-mec-block h5{margin:0 0 5px; font-size:14px; font-weight:700}
.stat-mec-block p{margin:0; font-size:12.5px; color:rgba(255,255,255,.55); line-height:1.45}

/* ─── TARIFS ─── */
.tarifs-section{background:var(--c-blanc-casse); border-top:1px solid var(--c-gris-200)}
.tarifs-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px}
.tarif-card{
  padding:28px 30px; border-radius:20px; border:1px solid var(--c-gris-200);
  background:#fff; position:relative; overflow:hidden; transition:all .2s ease;
}
.tarif-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.07); transform:translateY(-2px)}
.tarif-card.featured{border-color:var(--c-mec-ambre); box-shadow:0 0 0 3px rgba(217,119,6,.06)}
.tarif-card.featured::before{
  content:""; position:absolute; left:0; top:0; bottom:0;
  width:4px; background:linear-gradient(180deg, var(--c-mec-ambre-clair) 0%, var(--c-mec-ambre-dark) 100%);
}
.tarif-badge{

/* ─── SECTION NAV ─── */
function SectionNav(){
  const [active, setActive] = useState('');
  useEffect(() => {
    const sections = ['services','comment-ca-marche','tarifs','pourquoi-nous','avis','contact'];
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) setActive(e.target.id); });
    }, { rootMargin:'-30% 0px -60% 0px' });
    sections.forEach(id => { const el = document.getElementById(id); if(el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);
  const links = [
    { id:'services', label:'Services' },
    { id:'comment-ca-marche', label:'Comment ça marche' },
    { id:'tarifs', label:'Tarifs' },
    { id:'pourquoi-nous', label:'Nos engagements' },
    { id:'avis', label:'Avis clients' },
    { id:'contact', label:'Contact' },
  ];
  return (
    <div className="section-nav">
      <div className="sn-inner">
        {links.map((l, i) => (
          <React.Fragment key={l.id}>
            {i > 0 && <span className="sn-sep" />}
            <a className={`sn-link${active === l.id ? ' active' : ''}`} href={`#${l.id}`}>
              {l.label}
            </a>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}
