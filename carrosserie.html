<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clinic Carrosserie — Tôlerie, peinture & débosselage</title>
<link rel="icon" type="image/svg+xml" href="favicon-car.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
:root{
  --c-vert-nuit:#012A1A;
  --c-vert-foret:#0D5C3A;
  --c-vert-accent:#2ECC71;
  --c-blanc-casse:#F5F5F0;
  --c-noir-doux:#1A1A1A;
  --c-gris-100:#EEEEE8;
  --c-gris-200:#DDDDD5;
  --c-gris-300:#BFBFB6;
  --c-gris-400:#8C8C85;
  --c-gris-500:#5A5A55;

  --c-car-bleu:#1565A8;
  --c-car-bleu-clair:#1976D2;
  --c-car-bleu-dark:#0B3D6B;
  --c-car-bleu-xdark:#061E38;
  --c-car-bleu-pastel:#90CAF9;
  --c-car-bleu-bg:#EBF3FB;
  --c-car-bleu-light:#BBDEFB;

  --ff-sans:"Inter", system-ui, -apple-system, sans-serif;
  --ff-mono:"JetBrains Mono", ui-monospace, Menlo, monospace;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--ff-sans);
  color:var(--c-noir-doux);
  background:#fff;
  font-size:15px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
a{color:inherit; text-decoration:none}
button{font-family:inherit; cursor:pointer; border:none}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--ff-sans); font-weight:600; font-size:14px;
  padding:11px 20px; border-radius:10px;
  border:1px solid transparent; cursor:pointer;
  transition:all .15s ease; white-space:nowrap;
}
.btn-car{background:var(--c-car-bleu); color:#fff}
.btn-car:hover{background:var(--c-car-bleu-dark)}
.btn-ghost{background:transparent; color:var(--c-car-bleu); border-color:var(--c-car-bleu)}
.btn-ghost:hover{background:var(--c-car-bleu-bg)}
.btn-ghost-white{background:transparent; color:#fff; border-color:rgba(255,255,255,.4)}
.btn-ghost-white:hover{background:rgba(255,255,255,.1)}
.btn-ghost-dark{background:transparent; color:var(--c-noir-doux); border:1.5px solid var(--c-gris-200)}
.btn-ghost-dark:hover{background:var(--c-gris-100)}
.btn-lg{padding:14px 24px; font-size:15px; border-radius:12px}
.btn-xl{padding:16px 28px; font-size:16px; border-radius:12px; font-weight:700}

/* ─── NAVBAR ─── */
.topnav{
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:#fff;
  border-bottom:1px solid var(--c-gris-200);
  padding:0;
}
.topnav .inner{
  max-width:1280px; margin:0 auto; padding:0 32px;
  height:64px;
  display:flex; align-items:center; justify-content:space-between;
}
.nav-brand{
  display:inline-flex; align-items:center; gap:10px;
  font-weight:700; font-size:18px; letter-spacing:-.015em;
  color:var(--c-noir-doux);
}
.nav-brand .glyph{
  width:34px; height:34px; border-radius:9px;
  background:linear-gradient(135deg, var(--c-car-bleu-clair) 0%, var(--c-car-bleu-dark) 100%);
  display:grid; place-items:center; color:#fff; font-weight:800; font-size:15px;
  flex-shrink:0;
}
.nav-brand .brand-name span{color:var(--c-car-bleu-clair)}
.nav-links{display:flex; gap:2px; align-items:center; margin-left:32px}
.nav-link{
  color:var(--c-gris-500); padding:7px 14px; border-radius:8px;
  font-size:14px; font-weight:500; transition:all .15s ease;
}
.nav-link:hover{color:var(--c-car-bleu); background:var(--c-car-bleu-bg)}
.nav-right{display:flex; align-items:center; gap:20px; margin-left:auto}

/* ─── UNIVERSE NAV LINKS ─── */
.nav-universe-links{display:flex; gap:2px; align-items:center; margin-left:24px}
.nav-uni-link{
  color:var(--c-gris-500); padding:7px 12px; border-radius:8px;
  font-size:13.5px; font-weight:500; transition:all .15s ease;
  display:flex; align-items:center; gap:7px; white-space:nowrap;
}
.nav-uni-link:hover{color:var(--c-noir-doux); background:var(--c-gris-100)}
.nav-uni-link .swatch{width:7px; height:7px; border-radius:50%; flex-shrink:0}
.nav-uni-link.pro .swatch{background:#2ECC71}
.nav-uni-link.dep .swatch{background:#E74C3C}
.nav-uni-link.mec .swatch{background:#F59E0B}
.nav-uni-link.car .swatch{background:#1976D2}
.nav-uni-link.active{color:var(--c-noir-doux); font-weight:600; background:var(--c-gris-100)}
.nav-mobile-group{display:none; align-items:center; gap:10px}
.nav-mobile-call{display:grid; width:38px; height:38px; border-radius:50%; color:#fff; place-items:center; flex-shrink:0}
.nav-burger{
  display:flex; flex-direction:column; justify-content:center; gap:5px;
  width:38px; height:38px; border-radius:9px; padding:10px;
  background:var(--c-gris-100); cursor:pointer; border:none; flex-shrink:0;
}
.nav-burger span{display:block; height:2px; border-radius:2px; background:var(--c-noir-doux); transition:all .25s ease}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-burger.open span:nth-child(2){opacity:0; transform:scaleX(0)}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-drawer{position:fixed; inset:0; z-index:49; pointer-events:none}
.mobile-drawer-backdrop{position:absolute; inset:0; background:rgba(0,0,0,.45); opacity:0; transition:opacity .3s ease}
.mobile-drawer-panel{
  position:absolute; top:0; right:0; bottom:0; width:min(300px, 85vw);
  background:var(--c-vert-nuit); padding:80px 24px 36px;
  display:flex; flex-direction:column;
  transform:translateX(100%); transition:transform .3s ease;
  border-left:1px solid rgba(255,255,255,.08);
}
.mobile-drawer.open{pointer-events:all}
.mobile-drawer.open .mobile-drawer-backdrop{opacity:1}
.mobile-drawer.open .mobile-drawer-panel{transform:translateX(0)}
.mobile-nav-links{display:flex; flex-direction:column; gap:4px; margin-bottom:auto}
.mobile-nav-link{
  display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:12px;
  color:#fff; font-size:16px; font-weight:500; transition:background .15s ease;
}
.mobile-nav-link:hover{background:rgba(255,255,255,.07)}
.mobile-nav-link.active{background:rgba(255,255,255,.1); font-weight:600}
.mobile-nav-link .swatch{width:9px; height:9px; border-radius:50%; flex-shrink:0}
.mobile-nav-link.pro .swatch{background:#2ECC71}
.mobile-nav-link.dep .swatch{background:#E74C3C}
.mobile-nav-link.mec .swatch{background:#F59E0B}
.mobile-nav-link.car .swatch{background:#1976D2}
.mobile-drawer-cta{
  display:flex; align-items:center; gap:10px; padding:14px 18px; border-radius:12px;
  margin-top:20px; font-weight:600; font-size:15px; justify-content:center; color:#fff;
}

/* ─── HERO ─── */
.hero-car{
  background:#fff;
  padding:64px 0 0;
  position:relative; overflow:hidden;
  min-height:100vh;
  display:flex; flex-direction:column;
}
.hero-car .container{
  max-width:1280px; margin:0 auto; padding:0 32px;
  position:relative; z-index:1;
  flex:1;
}
.hero-grid{
  display:grid; grid-template-columns:1fr 1.05fr;
  gap:48px; align-items:center;
  min-height:calc(100vh - 64px);
  padding:56px 0 0;
}

/* Left — text */
.hero-eyebrow{
  font-family:var(--ff-mono); font-size:11.5px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--c-car-bleu);
  margin-bottom:24px; display:flex; align-items:center; gap:12px;
}
.hero-eyebrow::before{content:""; width:28px; height:1px; background:var(--c-car-bleu)}
.hero-car h1{
  font-size:64px; line-height:1.02; letter-spacing:-.038em;
  font-weight:800; margin:0 0 22px; color:var(--c-vert-nuit);
}
.hero-car h1 em{font-style:normal; color:var(--c-car-bleu-clair)}
.hero-car .lede{
  font-size:16.5px; color:var(--c-gris-500); line-height:1.6;
  max-width:460px; margin:0 0 36px;
}
.hero-cta-row{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:48px}
.hero-stats{
  display:flex; gap:0;
  border-top:1px solid var(--c-gris-200); padding-top:28px;
}
.hero-stats .hs{
  padding:0 28px 0 0;
  margin-right:28px;
  border-right:1px solid var(--c-gris-200);
}
.hero-stats .hs:last-child{border-right:none; margin-right:0}
.hero-stats .hs-label{
  font-family:var(--ff-mono); font-size:9.5px; letter-spacing:.16em;
  text-transform:uppercase; color:var(--c-gris-400); margin-bottom:5px;
}
.hero-stats .hs-val{
  font-size:22px; font-weight:800; letter-spacing:-.025em; color:var(--c-vert-nuit);
}

/* Right — visual panel */
.hero-visual-car{
  background:linear-gradient(158deg, var(--c-car-bleu-xdark) 0%, var(--c-car-bleu) 52%, #29B6F6 100%);
  border-radius:28px 28px 0 0;
  padding:36px 36px 0;
  align-self:stretch;
  display:flex; flex-direction:column;
  position:relative; overflow:hidden;
}
.hero-visual-car::before{
  content:""; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 80% 15%, rgba(255,255,255,.07), transparent 55%),
    repeating-linear-gradient(115deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 80px),
    repeating-linear-gradient(25deg, rgba(255,255,255,.015) 0px, rgba(255,255,255,.015) 1px, transparent 1px, transparent 80px);
  pointer-events:none;
}

/* Before/after cards */
.ba-cards{
  display:grid; grid-template-columns:1fr 1fr; gap:14px;
  flex:1; position:relative; z-index:1;
}
.ba-card{
  border-radius:18px; overflow:hidden;
  display:flex; flex-direction:column;
  min-height:380px;
  position:relative;
}
.ba-card.avant{
  background:linear-gradient(160deg, #061829 0%, #0B3D6B 100%);
}
.ba-card.apres{
  background:linear-gradient(160deg, #1976D2 0%, #4FC3F7 100%);
}
.ba-label{
  font-family:var(--ff-mono); font-size:10px; letter-spacing:.22em;
  text-transform:uppercase; color:rgba(255,255,255,.65);
  padding:16px 18px 0; position:relative; z-index:1;
}
.ba-placeholder{
  flex:1;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.ba-placeholder svg{opacity:.12}
.avant .ba-placeholder{
  background:repeating-linear-gradient(
    -45deg,
    rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px,
    transparent 1px, transparent 14px
  );
}
.apres .ba-placeholder{
  background:linear-gradient(180deg, transparent 0%, rgba(255,255,255,.08) 100%);
}
.ba-caption{
  padding:16px 18px;
  border-top:1px solid rgba(255,255,255,.12);
  position:relative; z-index:1;
}
.ba-caption .bc-main{
  font-size:13px; font-weight:600; color:#fff; margin-bottom:2px;
}
.ba-caption .bc-sub{
  font-size:11.5px; color:rgba(255,255,255,.55);
}
.ba-caption .bc-highlight{
  font-size:20px; font-weight:800; color:#fff; letter-spacing:-.02em; line-height:1.15;
}
.gallery-row{
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(8px);
  border-radius:14px; padding:16px 20px;
  margin-top:14px; position:relative; z-index:1;
  cursor:pointer; transition:background .15s ease;
}
.gallery-row:hover{background:rgba(255,255,255,.18)}
.gallery-row-left{}
.gallery-row .gr-title{font-size:14px; font-weight:700; color:#fff; margin-bottom:3px}
.gallery-row .gr-count{
  font-family:var(--ff-mono); font-size:11px; color:rgba(255,255,255,.55); letter-spacing:.04em;
}
.gallery-row .gr-arrow{
  width:36px; height:36px; border-radius:50%;
  background:rgba(255,255,255,.18); display:grid; place-items:center; color:#fff;
  transition:all .2s ease; flex-shrink:0;
}
.gallery-row:hover .gr-arrow{background:rgba(255,255,255,.32); transform:translateX(4px)}

/* ─── TRUST BAR ─── */
.trust-bar{
  background:var(--c-blanc-casse);
  border-bottom:1px solid var(--c-gris-200);
}
.trust-bar .inner{
  max-width:1280px; margin:0 auto; padding:0 32px;
  display:grid; grid-template-columns:repeat(4,1fr);
}
.trust-item{
  display:flex; align-items:center; gap:14px;
  padding:24px;
  border-right:1px solid var(--c-gris-200);
}
.trust-item:first-child{padding-left:0}
.trust-item:last-child{border-right:none}
.trust-ico{
  width:42px; height:42px; border-radius:11px;
  background:var(--c-car-bleu-bg); color:var(--c-car-bleu);
  display:grid; place-items:center; flex-shrink:0;
}
.trust-item h5{margin:0 0 2px; font-size:14.5px; font-weight:700; color:var(--c-vert-nuit)}
.trust-item p{margin:0; font-size:12.5px; color:var(--c-gris-400); line-height:1.35}

/* ─── SECTIONS COMMUNES ─── */
.section{padding:96px 0}
.container{max-width:1280px; margin:0 auto; padding:0 32px}
.section-head{
  display:grid; grid-template-columns:1fr 1.2fr; gap:64px;
  align-items:end; margin-bottom:56px;
}
.lbl{
  font-family:var(--ff-mono); font-size:11px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--c-car-bleu);
  margin-bottom:16px; display:flex; align-items:center; gap:12px;
}
.lbl::before{content:""; width:28px; height:1px; background:var(--c-car-bleu)}
.section-head h2{
  font-size:44px; line-height:1.06; letter-spacing:-.025em;
  font-weight:700; margin:0; color:var(--c-vert-nuit);
}
.section-head .desc{
  font-size:15.5px; color:var(--c-gris-500); line-height:1.65;
}

/* ─── PRESTATIONS ─── */
.prestations-section{background:#fff; border-top:1px solid var(--c-gris-200)}
.prestations-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px}
.srv-card{
  padding:26px 28px; border-radius:18px;
  border:1px solid var(--c-gris-200);
  background:var(--c-blanc-casse);
  display:flex; flex-direction:column; gap:14px;
  transition:all .2s ease;
}
.srv-card:hover{
  border-color:rgba(21,101,168,.3);
  box-shadow:0 6px 24px rgba(21,101,168,.08);
  transform:translateY(-2px);
}
.srv-ico{
  width:48px; height:48px; border-radius:12px;
  background:var(--c-car-bleu-bg); color:var(--c-car-bleu);
  display:grid; place-items:center;
}
.srv-card h4{margin:0; font-size:16px; font-weight:700; color:var(--c-vert-nuit)}
.srv-card p{margin:0; font-size:13.5px; color:var(--c-gris-500); line-height:1.55}
.srv-tag{
  display:inline-flex; font-family:var(--ff-mono); font-size:10.5px;
  letter-spacing:.06em; color:var(--c-car-bleu);
  background:var(--c-car-bleu-bg); padding:4px 10px; border-radius:20px;
  margin-top:auto; font-weight:600;
}

/* ─── GALLERY AVANT/APRÈS ─── */
.gallery-section{background:var(--c-blanc-casse); border-top:1px solid var(--c-gris-200)}
.gallery-grid{
  display:grid; grid-template-columns:repeat(3,1fr); gap:16px;
}
.gallery-pair{
  border-radius:20px; overflow:hidden; border:1px solid var(--c-gris-200);
  background:#fff;
  transition:all .2s ease;
  cursor:pointer;
}
.gallery-pair:hover{
  box-shadow:0 10px 32px rgba(21,101,168,.12); transform:translateY(-3px);
  border-color:rgba(21,101,168,.2);
}
.gp-images{display:grid; grid-template-columns:1fr 1fr; height:200px}
.gp-avant{
  background:linear-gradient(160deg, #0a1e30 0%, #0B3D6B 100%);
  display:flex; flex-direction:column;
  padding:12px;
}
.gp-apres{
  background:linear-gradient(160deg, #1976D2 0%, #4FC3F7 100%);
  display:flex; flex-direction:column;
  padding:12px;
}
.gp-tag{
  font-family:var(--ff-mono); font-size:9.5px; letter-spacing:.18em;
  text-transform:uppercase; color:rgba(255,255,255,.6);
}
.gp-meta{
  margin-top:auto;
  display:flex; gap:4px; flex-wrap:wrap;
}
.gp-chip{
  background:rgba(255,255,255,.15); color:#fff;
  font-size:11px; font-weight:600; padding:3px 8px; border-radius:6px;
}
.gp-info{padding:16px 18px}
.gp-title{font-size:14px; font-weight:700; color:var(--c-vert-nuit); margin-bottom:4px}
.gp-detail{font-size:12.5px; color:var(--c-gris-400)}

/* ─── PROCESS ─── */
.how-section{background:#fff; border-top:1px solid var(--c-gris-200)}
.steps-grid{
  display:grid; grid-template-columns:repeat(4,1fr); gap:0;
  position:relative;
}
.steps-grid::before{
  content:""; position:absolute;
  top:33px; left:calc(12.5% + 20px); right:calc(12.5% + 20px);
  height:1px; background:var(--c-gris-200); z-index:0;
}
.step{display:flex; flex-direction:column; align-items:center; text-align:center; padding:0 20px; position:relative; z-index:1}
.step-num{
  width:66px; height:66px; border-radius:50%;
  background:#fff; border:2px solid var(--c-gris-200);
  display:grid; place-items:center;
  color:var(--c-car-bleu); margin-bottom:22px;
  font-family:var(--ff-mono); font-size:18px; font-weight:700;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  transition:all .2s ease;
}
.step:hover .step-num{
  background:var(--c-car-bleu); color:#fff; border-color:var(--c-car-bleu);
}
.step h4{margin:0 0 6px; font-size:16px; font-weight:700; color:var(--c-vert-nuit)}
.step p{margin:0; font-size:13.5px; color:var(--c-gris-500); line-height:1.5}
.step .step-ico-wrap{
  width:66px; height:66px; border-radius:50%;
  background:#fff; border:2px solid var(--c-gris-200);
  display:grid; place-items:center;
  color:var(--c-car-bleu); margin-bottom:22px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  transition:all .2s ease;
}
.step:hover .step-ico-wrap{background:var(--c-car-bleu); color:#fff; border-color:var(--c-car-bleu)}

/* ─── POURQUOI NOUS ─── */
.why-car-section{background:var(--c-vert-nuit); color:#fff; padding:96px 0; position:relative; overflow:hidden}
.why-car-section::before{
  content:""; position:absolute; right:-150px; top:-150px;
  width:420px; height:420px; border-radius:50%;
  background:radial-gradient(circle, rgba(21,101,168,.15), transparent 65%);
  pointer-events:none;
}
.why-car-section::after{
  content:""; position:absolute; left:-100px; bottom:-100px;
  width:350px; height:350px; border-radius:50%;
  background:radial-gradient(circle, rgba(144,202,249,.07), transparent 65%);
  pointer-events:none;
}
.why-car-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px; position:relative; z-index:1}
.why-car-card{
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.07);
  border-radius:18px; padding:26px 28px;
  display:flex; gap:18px; align-items:flex-start; transition:all .2s ease;
}
.why-car-card:hover{background:rgba(255,255,255,.08)}
.wcc-ico{
  width:46px; height:46px; border-radius:12px;
  background:rgba(21,101,168,.3); color:var(--c-car-bleu-pastel);
  display:grid; place-items:center; flex-shrink:0;
}
.wcc-body h4{margin:0 0 5px; font-size:16px; font-weight:700}
.wcc-body p{margin:0; font-size:13.5px; color:rgba(255,255,255,.55); line-height:1.5}

/* ─── STATS ─── */
.stats-car-section{
  background:linear-gradient(135deg, var(--c-car-bleu-xdark) 0%, var(--c-car-bleu-dark) 50%, var(--c-car-bleu) 100%);
  color:#fff; padding:96px 0; position:relative; overflow:hidden;
}
.stats-car-section::before{
  content:""; position:absolute; inset:0;
  background:repeating-linear-gradient(115deg, rgba(255,255,255,.02) 0px, rgba(255,255,255,.02) 1px, transparent 1px, transparent 80px);
  pointer-events:none;
}
.stats-car-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:0; position:relative; z-index:1}
.stat-car-block{border-left:1px solid rgba(255,255,255,.15); padding-left:28px}

/* ─── SECTION NAV ─── */
function SectionNav(){
  const [active, setActive] = useState('');
  useEffect(() => {
    const sections = ['prestations','gallery','comment-ca-marche','atelier','avis','contact'];
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) setActive(e.target.id); });
    }, { rootMargin:'-30% 0px -60% 0px' });
    sections.forEach(id => { const el = document.getElementById(id); if(el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);
  const links = [
    { id:'prestations', label:'Prestations' },
    { id:'gallery', label:'Galerie' },
    { id:'comment-ca-marche', label:'Rendez-vous' },
    { id:'atelier', label:'Notre atelier' },
    { id:'avis', label:'Avis clients' },
    { id:'contact', label:'Contact' },
  ];
  return (
    <div className="section-nav">
      <div className="sn-inner">
        {links.map((l, i) => (
          <React.Fragment key={l.id}>
            {i > 0 && <span className="sn-sep" />}
            <a className={`sn-link${active === l.id ? ' active' : ''}`} href={`#${l.id}`}>
              {l.label}
            </a>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}
